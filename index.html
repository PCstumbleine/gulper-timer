  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      const sw = `
        self.addEventListener('install', e => e.waitUntil(caches.open('gulper-v1').then(c => c.addAll(['.']))));
        self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
      `;
      const blob = new Blob([sw], {type:'text/javascript'});
      navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
    });
  }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Default task hierarchy (mutable per session) ─────────────────────
const DEFAULT_TASKS = [
  { id: 'travel',     label: 'Travel',     subtasks: ['Travel to household', 'Travel to disposal site'] },
  { id: 'setup',      label: 'Setup',      subtasks: ['Inspect the pit latrine', 'Client engagement', 'Dig trench', 'Put hole in pit liner'] },
  { id: 'extraction', label: 'Extraction', subtasks: ['Removing sludge', 'Pulling out trash'] },
  { id: 'fluidizing', label: 'Fluidizing', subtasks: ['Adding water'] },
  { id: 'cleaning',   label: 'Cleaning',   subtasks: ['Washing slab', 'Tidying area'] },
  { id: 'completion', label: 'Completion', subtasks: ['Repair pit liner', 'Fill trench', 'Containerization', 'Clean equipment', 'Client engagement', 'Container transport'] },
  { id: 'rest',       label: 'Rest',       subtasks: [] },
  { id: 'disposal',   label: 'Disposal',   subtasks: [] },
];

// ── Helpers ───────────────────────────────────────────────────────────
function fmtTimer(ms, compact = false) {
  const s = Math.floor(ms / 1000), m = Math.floor(s / 60), sec = s % 60;
  const t = Math.floor((ms % 1000) / 100);
  return compact
    ? `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
    : `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}.${t}`;
}
function fmtWall(d) { return d ? d.toTimeString().slice(0,8) : '—'; }
function fmtLocalDate(d) {
  if (!d) return '';
  const dt = d instanceof Date ? d : new Date(d);
  return dt.toLocaleDateString('en-GB');
}
function fmtLocalTime(d) {
  if (!d) return '';
  const dt = d instanceof Date ? d : new Date(d);
  return dt.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
function genJobId() {
  const today = new Date();
  const dateStr = `${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;
  const storageKey = `gulper_job_count_${dateStr}`;
  const count = parseInt(localStorage.getItem(storageKey) || '0') + 1;
  localStorage.setItem(storageKey, String(count));
  return `job_${dateStr}_${String(count).padStart(2,'0')}`;
}
function newGulper(name) {
  return { name, taskId: 'travel', subtaskIdx: 0, elapsed: 0, running: false, lastStart: null, log: [] };
}
function parseCoords(str) {
  const m = str.match(/(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)/);
  return m ? { lat: parseFloat(m[1]), lng: parseFloat(m[2]) } : null;
}
function fmtCoords(c) {
  if (!c) return '—';
  return `${c.lat.toFixed(6)}, ${c.lng.toFixed(6)}`;
}
// Returns a coord object as a plain string, empty string if null
function coordStr(c) {
  return c ? `${c.lat.toFixed(6)}, ${c.lng.toFixed(6)}` : '';
}

// ── App shell ─────────────────────────────────────────────────────────
function App() {
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accent": "#e8a020",
    "darkMode": true
  }/*EDITMODE-END*/;

  // Load theme from localStorage; default dark
  const [tweaks, setTweaks] = useState(() => {
    try {
      const stored = localStorage.getItem('gulper_theme');
      if (stored === 'light') return { ...TWEAK_DEFAULTS, darkMode: false };
      if (stored === 'dark')  return { ...TWEAK_DEFAULTS, darkMode: true };
    } catch(e) {}
    return TWEAK_DEFAULTS;
  });
  const [tweaksOpen, setTweaksOpen] = useState(false);

  // screen: 'setup' | 'timer' | 'review'
  const [screen, setScreen] = useState('setup');
  // true when returning to Setup from an active Timer session
  const [isResuming, setIsResuming] = useState(false);

  // session metadata
  const [session, setSession] = useState({
    jobId: '',
    enumerator: '',
    gulper1Name: 'Gulper 1',
    gulper1Home: null,
    gulper2Name: 'Gulper 2',
    gulper2Home: null,
    latrineCoords: null,
    sessionStart: null,
  });

  const [tasks, setTasks] = useState(DEFAULT_TASKS);
  const [gulpers, setGulpers] = useState(null);

  // Toggle dark/light and persist to localStorage
  function toggleTheme() {
    setTweaks(t => {
      const next = { ...t, darkMode: !t.darkMode };
      try { localStorage.setItem('gulper_theme', next.darkMode ? 'dark' : 'light'); } catch(e) {}
      return next;
    });
  }

  // Fresh session: reset everything
  function startSession(meta) {
    setSession({ ...meta, sessionStart: new Date() });
    setGulpers([newGulper(meta.gulper1Name), newGulper(meta.gulper2Name)]);
    setIsResuming(false);
    setScreen('timer');
  }

  // Resume: update metadata + gulper names, but do NOT reset timers or logs
  function resumeSession(meta) {
    setSession(s => ({
      ...s,
      enumerator: meta.enumerator,
      jobId: meta.jobId,
      gulper1Name: meta.gulper1Name,
      gulper1Home: meta.gulper1Home,
      gulper2Name: meta.gulper2Name,
      gulper2Home: meta.gulper2Home,
      // sessionStart and latrineCoords intentionally preserved
    }));
    // Update live gulper names only; existing log entries keep their old gulper name
    setGulpers(gs => gs.map((g, i) => ({
      ...g,
      name: i === 0 ? meta.gulper1Name : meta.gulper2Name,
    })));
    setIsResuming(false);
    setScreen('timer');
  }

  // Pause timers and return to Setup with current values pre-filled
  function backToSetup() {
    setIsResuming(true);
    setScreen('setup');
    // Timer pausing is handled in TimerScreen before calling this
  }

  function newSession() {
    setGulpers(null);
    setTasks(DEFAULT_TASKS);
    setSession({ jobId: '', enumerator: '', gulper1Name: 'Gulper 1', gulper1Home: null, gulper2Name: 'Gulper 2', gulper2Home: null, latrineCoords: null, sessionStart: null });
    setIsResuming(false);
    setScreen('setup');
  }

  // Theme variables
  const dark = tweaks.darkMode;
  const accent = tweaks.accent;
  const bg       = dark ? '#141412' : '#F5F4F0';
  const surface  = dark ? '#1F1E1B' : '#FFFFFF';
  const surface2 = dark ? '#252420' : '#F7F6F2';
  const divider  = dark ? '#2E2D28' : '#E0DED6';
  const tp       = dark ? '#F0EFE8' : '#141412';
  const ts       = dark ? '#8A8880' : '#6B6960';
  const theme    = { dark, accent, bg, surface, surface2, divider, tp, ts };

  // Design-mode message bridge (tweaks panel)
  useEffect(() => {
    const h = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);

  function setTweak(k, v) {
    const u = { ...tweaks, [k]: v };
    setTweaks(u);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: u }, '*');
  }

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', background: bg, color: tp }}>
      {screen === 'setup' && (
        <SetupScreen
          theme={theme}
          onStart={startSession}
          initialValues={isResuming ? session : null}
          onResume={isResuming ? resumeSession : null}
          toggleTheme={toggleTheme}
        />
      )}
      {screen === 'timer' && gulpers && (
        <TimerScreen
          theme={theme} session={session} setSession={setSession} tasks={tasks} setTasks={setTasks}
          gulpers={gulpers} setGulpers={setGulpers}
          onEnd={() => setScreen('review')}
          onBackToSetup={backToSetup}
          toggleTheme={toggleTheme}
        />
      )}
      {screen === 'review' && gulpers && (
        <ReviewScreen
          theme={theme} session={session} tasks={tasks}
          gulpers={gulpers}
          onBack={() => setScreen('timer')}
          onNewSession={newSession}
          toggleTheme={toggleTheme}
        />
      )}

      {/* Tweaks — design mode only, not shown in normal use */}
      <div className={`tweaks-panel ${tweaksOpen ? 'open' : ''}`}>
        <h3>Tweaks</h3>
        <div className="tweak-row">
          <label>Accent</label>
          <input type="color" value={tweaks.accent} onChange={e => setTweak('accent', e.target.value)} />
        </div>
        <div className="tweak-row">
          <label>Dark mode</label>
          <input type="checkbox" checked={tweaks.darkMode} onChange={e => setTweak('darkMode', e.target.checked)} />
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
// SCREEN 1 — Setup
// ═══════════════════════════════════════════════════════════════════════
function SetupScreen({ theme, onStart, initialValues, onResume, toggleTheme }) {
  const { dark, accent, bg, surface, surface2, divider, tp, ts } = theme;
  const isResuming = !!onResume;

  // When resuming, use existing jobId; for a new session, generate a fresh one
  const [jobId] = useState(() => initialValues?.jobId || genJobId());
  const [enumerator, setEnumerator] = useState(initialValues?.enumerator || '');
  const [g1Name, setG1Name] = useState(initialValues?.gulper1Name || 'Gulper 1');
  const [g1Home, setG1Home] = useState(coordStr(initialValues?.gulper1Home));
  const [g2Name, setG2Name] = useState(initialValues?.gulper2Name || 'Gulper 2');
  const [g2Home, setG2Home] = useState(coordStr(initialValues?.gulper2Home));
  const [locLoading, setLocLoading] = useState(null);

  function getLocation(setter) {
    if (!navigator.geolocation) return;
    setLocLoading(setter);
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        setter(`${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`);
        setLocLoading(null);
      },
      () => setLocLoading(null),
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }

  const canStart = g1Name.trim() && g2Name.trim();

  function handleStart() {
    if (!canStart) return;
    const meta = {
      jobId,
      enumerator: enumerator.trim(),
      gulper1Name: g1Name.trim(),
      gulper1Home: parseCoords(g1Home),
      gulper2Name: g2Name.trim(),
      gulper2Home: parseCoords(g2Home),
      // Preserve latrine coords captured on the Timer screen when resuming
      latrineCoords: initialValues?.latrineCoords || null,
    };
    if (onResume) {
      onResume(meta);
    } else {
      onStart(meta);
    }
  }

  const inputStyle = {
    width: '100%', padding: '10px 12px',
    background: surface2, border: `1px solid ${divider}`,
    borderRadius: 8, color: tp, fontSize: 15,
    outline: 'none',
    fontFamily: 'IBM Plex Sans',
  };
  const labelStyle = { fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: ts, marginBottom: 5, display: 'block' };

  function GpsField({ value, onChange }) {
    const isLoading = locLoading === onChange;
    return (
      <div style={{ display: 'flex', gap: 6 }}>
        <input
          value={value} onChange={e => onChange(e.target.value)}
          placeholder="lat, lng — e.g. -1.2921, 36.8219"
          style={{ ...inputStyle, flex: 1, fontFamily: 'IBM Plex Mono', fontSize: 13 }}
        />
        <button
          onClick={() => getLocation(onChange)}
          disabled={isLoading}
          title="Use my current location"
          style={{
            width: 42, borderRadius: 8, border: `1px solid ${divider}`,
            background: isLoading ? (dark ? '#2A2820' : '#F0EEE8') : surface2,
            cursor: isLoading ? 'default' : 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 18, flexShrink: 0,
          }}
        >{isLoading ? '…' : '📍'}</button>
      </div>
    );
  }

  return (
    <div style={{ flex: 1, overflowY: 'auto', padding: '0 0 32px' }}>
      {/* Header */}
      <div style={{
        padding: '28px 20px 20px', borderBottom: `1px solid ${divider}`,
        background: surface, display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 12,
      }}>
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: ts, marginBottom: 6 }}>Gulper Timer</div>
          <div style={{ fontSize: 26, fontWeight: 700, letterSpacing: '-0.02em' }}>
            {isResuming ? 'Resume Session' : 'New Session'}
          </div>
          <div style={{ fontSize: 14, color: ts, marginTop: 4 }}>
            {isResuming
              ? 'Edit details, then tap Resume to continue timing.'
              : 'Fill in job details before starting the timers.'}
          </div>
        </div>
        {/* Theme toggle — header shortcut */}
        <button
          onClick={toggleTheme}
          title={dark ? 'Switch to light mode' : 'Switch to dark mode'}
          style={{
            width: 44, height: 44, borderRadius: 10, border: `1px solid ${divider}`,
            background: surface2, cursor: 'pointer', flexShrink: 0,
            display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22, marginTop: 2,
          }}
        >{dark ? '☀️' : '🌙'}</button>
      </div>

      <div style={{ padding: '20px', display: 'flex', flexDirection: 'column', gap: 20, maxWidth: 640, margin: '0 auto', width: '100%' }}>

        {/* Appearance — prominent segmented control */}
        <div style={{ background: surface, borderRadius: 12, border: `1px solid ${divider}`, overflow: 'hidden' }}>
          <div style={{ padding: '10px 14px', borderBottom: `1px solid ${divider}`, fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: ts }}>
            Appearance
          </div>
          <div style={{ padding: 10 }}>
            <div style={{ display: 'flex', gap: 6, background: dark ? '#0E0D0B' : '#E0DFD9', borderRadius: 10, padding: 4 }}>
              {[{ label: '☀️  Light', val: false }, { label: '🌙  Dark', val: true }].map(opt => (
                <button
                  key={opt.label}
                  onClick={() => { if (dark !== opt.val) toggleTheme(); }}
                  style={{
                    flex: 1, height: 48, borderRadius: 8, border: 'none', cursor: 'pointer',
                    background: dark === opt.val ? (dark ? '#2C2B26' : '#FFFFFF') : 'transparent',
                    color: dark === opt.val ? tp : ts,
                    fontWeight: dark === opt.val ? 700 : 500, fontSize: 16,
                    boxShadow: dark === opt.val ? '0 1px 5px rgba(0,0,0,0.22)' : 'none',
                    transition: 'background 0.15s, color 0.15s, box-shadow 0.15s',
                  }}
                >{opt.label}</button>
              ))}
            </div>
          </div>
        </div>

        {/* Job info */}
        <Section label="Job Information" theme={theme}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 12px', background: dark ? 'rgba(232,160,32,0.08)' : 'rgba(232,160,32,0.06)', borderRadius: 8, border: `1px solid ${dark ? 'rgba(232,160,32,0.2)' : 'rgba(232,160,32,0.25)'}` }}>
              <div>
                <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: ts, marginBottom: 2 }}>Job ID (auto-generated)</div>
                <div style={{ fontFamily: 'IBM Plex Mono', fontSize: 16, fontWeight: 700, color: tp }}>{jobId}</div>
              </div>
              <span style={{ fontSize: 20 }}>🪪</span>
            </div>
            <div>
              <label style={labelStyle}>Enumerator name</label>
              <input value={enumerator} onChange={e => setEnumerator(e.target.value)} placeholder="Optional" style={inputStyle} />
            </div>
          </div>
        </Section>

        {/* Gulpers */}
        <Section label="Gulpers" theme={theme}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            {[
              { label: 'Gulper 1', name: g1Name, setName: setG1Name, home: g1Home, setHome: setG1Home },
              { label: 'Gulper 2', name: g2Name, setName: setG2Name, home: g2Home, setHome: setG2Home },
            ].map((g, i) => (
              <div key={i} style={{
                padding: 14, borderRadius: 10,
                background: dark ? 'rgba(255,255,255,0.03)' : 'rgba(0,0,0,0.03)',
                border: `1px solid ${divider}`,
              }}>
                <div style={{ fontWeight: 600, fontSize: 13, marginBottom: 10, color: ts, textTransform: 'uppercase', letterSpacing: '0.06em' }}>{g.label}</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                  <div>
                    <label style={labelStyle}>Name *</label>
                    <input value={g.name} onChange={e => g.setName(e.target.value)} placeholder={g.label} style={inputStyle} />
                  </div>
                  <div>
                    <label style={labelStyle}>Home base GPS</label>
                    <GpsField value={g.home} onChange={g.setHome} />
                  </div>
                </div>
              </div>
            ))}
          </div>
        </Section>

        {/* Start / Resume button */}
        <button
          onClick={handleStart}
          disabled={!canStart}
          style={{
            height: 58, borderRadius: 12, border: 'none',
            background: canStart ? accent : (dark ? '#2A2820' : '#E0DED6'),
            color: canStart ? '#fff' : ts,
            fontWeight: 700, fontSize: 17, cursor: canStart ? 'pointer' : 'default',
            transition: 'background 0.2s, color 0.2s',
            letterSpacing: '0.01em',
          }}
        >
          {isResuming ? 'Resume Session →' : 'Start Session →'}
        </button>
      </div>
    </div>
  );
}

function Section({ label, children, theme }) {
  const { surface, divider, ts } = theme;
  return (
    <div style={{ background: surface, borderRadius: 12, border: `1px solid ${divider}`, overflow: 'hidden' }}>
      <div style={{ padding: '10px 14px', borderBottom: `1px solid ${divider}`, fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: ts }}>

      </div>
      <div style={{ padding: 14 }}>{children}</div>
    </div>

}

// ═══════════════════════════════════════════════════════════════════════
// SCREEN 2 — Timer
// ═══════════════════════════════════════════════════════════════════════
function TimerScreen({ theme, session, setSession, tasks, setTasks, gulpers, setGulpers, onEnd, onBackToSetup, toggleTheme }) {
  const { dark, accent, bg, surface, surface2, divider, tp, ts } = theme;
  const [tick, setTick] = useState(0);
  const [picker, setPicker] = useState({ gulperIdx: null, open: false });

  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 100);
    return () => clearInterval(id);
  }, []);

  function liveElapsed(g) {
    return g.running && g.lastStart ? g.elapsed + (Date.now() - g.lastStart) : g.elapsed;
  }

  function toggleTimer(idx) {
    setGulpers(gs => gs.map((g, i) => {
      if (i !== idx) return g;
      return g.running
        ? { ...g, running: false, elapsed: g.elapsed + (Date.now() - g.lastStart), lastStart: null }
        : { ...g, running: true, lastStart: Date.now() };
    }));
  }

  function pickTask(gulperIdx, taskId, subtaskIdx) {
    setGulpers(gs => gs.map((g, i) => {
      if (i !== gulperIdx) return g;
      const elapsed = g.running ? g.elapsed + (Date.now() - g.lastStart) : g.elapsed;
      const oldTask = tasks.find(t => t.id === g.taskId);
      // Only log if meaningful time has elapsed (>2s) — avoids duplicate from onNextAndPick
      // Store gulper name so renames don't alter historical records
      const logEntries = elapsed > 2000 ? [{
        gulper: g.name,
        task: oldTask?.label,
        subtask: oldTask?.subtasks[g.subtaskIdx] || oldTask?.label,
        ms: elapsed, ts: new Date(),
      }, ...g.log] : g.log;
      return { ...g, taskId, subtaskIdx: subtaskIdx ?? 0, elapsed: 0, running: true, lastStart: Date.now(), log: logEntries };
    }));
    setPicker({ gulperIdx: null, open: false });
  }

  // Pause all timers, then go back to Setup
  function handleBackToSetup() {
    setGulpers(gs => gs.map(g => g.running
      ? { ...g, running: false, elapsed: g.elapsed + (Date.now() - g.lastStart), lastStart: null }
      : g
    ));
    onBackToSetup();
  }

  // Pause all timers, then go to Review
  function handleEnd() {
    setGulpers(gs => gs.map(g => g.running
      ? { ...g, running: false, elapsed: g.elapsed + (Date.now() - g.lastStart), lastStart: null }
      : g
    ));
    onEnd();
  }

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <TopBar
        session={session} setSession={setSession}
        onEnd={handleEnd}
        onBackToSetup={handleBackToSetup}
        toggleTheme={toggleTheme}
        theme={theme}
      />

      {/* Split view */}
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden', gap: 1, background: divider }}>
        {gulpers.map((g, idx) => (
          <GulperPanel
            key={idx} gulper={g} idx={idx} tasks={tasks}
            elapsed={liveElapsed(g)}
            onToggle={() => toggleTimer(idx)}
            onNextAndPick={() => {
              // Log current elapsed, stop timer, then open picker
              setGulpers(gs => gs.map((g, i) => {
                if (i !== idx) return g;
                const task = tasks.find(t => t.id === g.taskId);
                const elapsed = g.running ? g.elapsed + (Date.now() - g.lastStart) : g.elapsed;
                const subtaskLabel = task.subtasks.length > 0 ? task.subtasks[g.subtaskIdx] : task.label;
                // Store gulper name in entry so renames don't alter historical records
                const entry = { gulper: g.name, task: task.label, subtask: subtaskLabel, ms: elapsed, ts: new Date() };
                return { ...g, running: false, elapsed: 0, lastStart: null, log: [entry, ...g.log] };
              }));
              setPicker({ gulperIdx: idx, open: true });
            }}
            onPickTask={() => setPicker({ gulperIdx: idx, open: true })}
            theme={theme}
          />
        ))}
      </div>

      {picker.open && (
        <TaskPicker
          gulperName={gulpers[picker.gulperIdx]?.name}
          currentTaskId={gulpers[picker.gulperIdx]?.taskId}
          currentSubtaskIdx={gulpers[picker.gulperIdx]?.subtaskIdx}
          tasks={tasks} setTasks={setTasks}
          onPick={(tid, sidx) => pickTask(picker.gulperIdx, tid, sidx)}
          onClose={() => setPicker({ gulperIdx: null, open: false })}
          theme={theme}
        />
      )}
    </div>
  );
}

function TopBar({ session, setSession, onEnd, onBackToSetup, toggleTheme, theme }) {
  const { dark, surface, divider, tp, ts, accent } = theme;
  const [gpsLoading, setGpsLoading] = useState(false);
  const [gpsToast, setGpsToast] = useState(null);

  function captureLatrine() {
    if (!navigator.geolocation) return;
    setGpsLoading(true);
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        setSession(s => ({ ...s, latrineCoords: coords }));
        setGpsLoading(false);
        setGpsToast(`Latrine GPS saved: ${coords.lat.toFixed(5)}, ${coords.lng.toFixed(5)}`);
        setTimeout(() => setGpsToast(null), 3000);
      },
      () => { setGpsLoading(false); setGpsToast('Could not get location — try again.'); setTimeout(() => setGpsToast(null), 2500); },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }

  const hasCoordsLatrine = !!session.latrineCoords;

  return (
    <>
      <div style={{
        height: 56, display: 'flex', alignItems: 'center',
        padding: '0 10px', background: surface, borderBottom: `1px solid ${divider}`,
        flexShrink: 0, gap: 6,
      }}>
        {/* Back to Setup — top-left */}
        <button onClick={onBackToSetup} style={{
          display: 'flex', alignItems: 'center', gap: 3,
          padding: '6px 10px', borderRadius: 7, border: `1px solid ${divider}`,
          background: 'transparent', cursor: 'pointer',
          color: ts, fontSize: 13, fontWeight: 600, flexShrink: 0, whiteSpace: 'nowrap',
        }}>← Setup</button>

        {/* Job ID — flexible, truncates if needed */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 4, minWidth: 0, flex: 1 }}>
          <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: ts, flexShrink: 0 }}>Job</span>
          <span style={{ fontFamily: 'IBM Plex Mono', fontSize: 12, fontWeight: 600, color: tp, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{session.jobId}</span>
        </div>

        {/* Latrine GPS */}
        <button
          onClick={captureLatrine}
          title={hasCoordsLatrine ? `Latrine: ${fmtCoords(session.latrineCoords)} — tap to update` : 'Capture pit latrine GPS'}
          style={{
            display: 'flex', alignItems: 'center', gap: 5,
            padding: '4px 10px', borderRadius: 6, border: `1px solid ${hasCoordsLatrine ? accent : divider}`,
            background: hasCoordsLatrine ? (dark ? 'rgba(232,160,32,0.1)' : 'rgba(232,160,32,0.07)') : 'transparent',
            cursor: 'pointer', flexShrink: 0,
          }}
        >
          <span style={{ fontSize: 14 }}>{gpsLoading ? '…' : '📍'}</span>
          <span style={{ fontSize: 11, fontWeight: 600, color: hasCoordsLatrine ? accent : ts, whiteSpace: 'nowrap' }}>
            {gpsLoading ? 'Getting…' : hasCoordsLatrine ? 'Latrine ✓' : 'Latrine GPS'}
          </span>
        </button>

        {/* Session start clock */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 4, flexShrink: 0 }}>
          <span style={{ fontSize: 10, color: ts }}>Started</span>
          <span style={{ fontFamily: 'IBM Plex Mono', fontSize: 11, fontWeight: 600, color: tp }}>{fmtWall(session.sessionStart)}</span>
        </div>

        {/* Theme toggle */}
        <button
          onClick={toggleTheme}
          title={dark ? 'Switch to light mode' : 'Switch to dark mode'}
          style={{
            width: 36, height: 36, borderRadius: 8, border: `1px solid ${divider}`,
            background: 'transparent', cursor: 'pointer', flexShrink: 0,
            display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18,
          }}
        >{dark ? '☀️' : '🌙'}</button>

        {/* End Session — large, filled red, top-right */}
        <button onClick={onEnd} style={{
          height: 42, padding: '0 16px', borderRadius: 8,
          border: 'none', background: '#CC3333', color: '#fff',
          fontWeight: 700, fontSize: 14, cursor: 'pointer', flexShrink: 0, whiteSpace: 'nowrap',
        }}>End Session</button>
      </div>

      {/* GPS toast */}
      {gpsToast && (
        <div style={{
          position: 'fixed', top: 64, left: '50%', transform: 'translateX(-50%)',
          background: dark ? '#2A2820' : '#1A1917', color: '#fff',
          borderRadius: 8, padding: '8px 16px', fontSize: 12, fontWeight: 500,
          boxShadow: '0 4px 20px rgba(0,0,0,0.3)', pointerEvents: 'none', zIndex: 300,
          whiteSpace: 'nowrap', maxWidth: '90vw',
        }}>{gpsToast}</div>
      )}
    </>
  );
}

function GulperPanel({ gulper, idx, tasks, elapsed, onToggle, onNextAndPick, onPickTask, theme }) {
  const { dark, accent, surface, divider, tp, ts } = theme;
  const task = tasks.find(t => t.id === gulper.taskId) || tasks[0];
  const hasSubtasks = task.subtasks.length > 0;
  const subtaskLabel = hasSubtasks ? task.subtasks[gulper.subtaskIdx] : null;
  const taskIdx = tasks.findIndex(t => t.id === gulper.taskId);
  const isLast = !hasSubtasks && taskIdx === tasks.length - 1;
  const logBg = dark ? '#181714' : '#F0EFE8';

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: surface, overflow: 'hidden' }}>
      {/* Header — gulper name centered and large */}
      <div style={{ padding: '10px 14px 8px', borderBottom: `1px solid ${divider}`, flexShrink: 0, position: 'relative' }}>
        <div style={{
          textAlign: 'center', fontWeight: 700, fontSize: 26,
          color: tp, letterSpacing: '-0.01em', lineHeight: 1.15,
        }}>
          {gulper.name}
        </div>
        <div style={{ position: 'absolute', top: '50%', right: 14, transform: 'translateY(-50%)' }}>
          <StatusDot running={gulper.running} accent={accent} />
        </div>
      </div>

      {/* Task + subtask — large, high-contrast */}
      <div style={{ padding: '8px 14px 4px', flexShrink: 0 }}>
        <button onClick={onPickTask} style={{
          background: 'transparent', border: 'none', cursor: 'pointer',
          padding: '2px 0', display: 'flex', alignItems: 'center', gap: 6, color: tp,
        }}>
          <span style={{ fontSize: 26, fontWeight: 700 }}>{task.label}</span>
          <span style={{ fontSize: 14, color: ts, marginTop: 3 }}>▾</span>
        </button>
        {hasSubtasks && (
          <div style={{ fontSize: 18, fontWeight: 600, color: tp, marginTop: 2, paddingLeft: 2 }}>
            {subtaskLabel}
            <span style={{ color: dark ? '#555' : '#C0BDB4', marginLeft: 8, fontSize: 13, fontWeight: 400 }}>

          </div>
        )}
      </div>

      {/* Stopwatch */}
      <div style={{
        margin: '6px 14px 8px', borderRadius: 10, padding: '12px 14px',
        background: gulper.running ? (dark ? 'rgba(232,160,32,0.1)' : 'rgba(232,160,32,0.07)') : (dark ? '#1A1917' : '#F5F4F0'),
        border: `2px solid ${gulper.running ? accent : 'transparent'}`,
        transition: 'border-color 0.2s, background 0.2s', flexShrink: 0,

        <div style={{
          fontFamily: 'IBM Plex Mono', fontSize: 'clamp(30px, 6vw, 50px)', fontWeight: 700,
          letterSpacing: '-0.02em', color: gulper.running ? accent : tp, lineHeight: 1, transition: 'color 0.2s',
        }}>{fmtTimer(elapsed)}</div>
      </div>

      {/* Buttons */}
      <div style={{ padding: '0 14px', display: 'flex', flexDirection: 'column', gap: 8, flexShrink: 0 }}>
        <button onClick={onToggle} style={{
          height: 52, borderRadius: 10, border: 'none', cursor: 'pointer',
          background: gulper.running ? (dark ? '#2A2820' : '#FFF3DC') : accent,
          color: gulper.running ? accent : '#fff',
          fontWeight: 700, fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
        }}>
          {gulper.running ? <><PauseIcon color={accent} /> Pause</> : <><PlayIcon color="#fff" /> Resume</>}
        </button>
        <button onClick={onNextAndPick} disabled={isLast} style={{
          height: 56, borderRadius: 10,
          border: `1.5px solid ${isLast ? divider : (dark ? '#3A3930' : '#D8D6CD')}`,
          cursor: isLast ? 'default' : 'pointer', background: 'transparent',
          color: isLast ? (dark ? '#444' : '#C0BDB4') : tp,
          fontWeight: 600, fontSize: 15, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
        }}>
          <NextIcon color={isLast ? (dark ? '#444' : '#C0BDB4') : tp} />
          Done — select next task
        </button>
      </div>

      {/* Log */}
      <div style={{ flex: 1, overflow: 'hidden', margin: '10px 0 0', display: 'flex', flexDirection: 'column' }}>
        <div style={{ padding: '0 14px 4px', flexShrink: 0 }}>
          <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: ts }}>
            Log · {gulper.log.length} {gulper.log.length === 1 ? 'entry' : 'entries'}
          </span>
        </div>
        <div style={{ flex: 1, overflowY: 'auto', background: logBg, borderTop: `1px solid ${divider}` }}>
          {gulper.log.length === 0
            ? <div style={{ padding: '12px 14px', fontSize: 12, color: ts, fontStyle: 'italic' }}>No entries yet</div>
            : gulper.log.map((entry, ei) => (

                  </span>
                  <span style={{ fontSize: 10, color: ts }}>{entry.ts.toTimeString().slice(0,8)}</span>
                </div>
                <span style={{ fontFamily: 'IBM Plex Mono', fontSize: 13, fontWeight: 600, color: tp, flexShrink: 0 }}>
                  {fmtTimer(entry.ms, true)}
                </span>
              </div>
            ))
          }
        </div>
      </div>
    </div>
  );
}

// ── Task Picker ────────────────────────────────────────────────────────
function TaskPicker({ gulperName, currentTaskId, currentSubtaskIdx, tasks, setTasks, onPick, onClose, theme }) {
  const { dark, accent, surface, divider, tp, ts } = theme;
  const [expandedTaskId, setExpandedTaskId] = useState(currentTaskId);
  const [addingTask, setAddingTask] = useState(false);
  const [newTaskName, setNewTaskName] = useState('');
  const [newSubtasks, setNewSubtasks] = useState('');

  function handleTaskClick(task) {
    if (task.subtasks.length === 0) { onPick(task.id, null); }
    else { setExpandedTaskId(prev => prev === task.id ? null : task.id); }
  }

  function submitNewTask() {
    const label = newTaskName.trim();
    if (!label) return;
    const subtasks = newSubtasks.split(',').map(s => s.trim()).filter(Boolean);
    const id = 'custom_' + Date.now();
    setTasks(prev => [...prev, { id, label, subtasks }]);
    setNewTaskName(''); setNewSubtasks(''); setAddingTask(false);
    setExpandedTaskId(id);
  }

  const inputSt = {
    width: '100%', padding: '9px 10px',
    background: dark ? '#1A1917' : '#F5F4F0',
    border: `1px solid ${divider}`, borderRadius: 8,
    color: tp, fontSize: 14, fontFamily: 'IBM Plex Sans', outline: 'none',
  };

  return (
    <>
      <div onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)', zIndex: 100 }} />
      <div style={{
        position: 'fixed', left: 0, right: 0, bottom: 0, zIndex: 101,
        background: surface, borderRadius: '16px 16px 0 0',
        maxHeight: '82vh', overflow: 'hidden',
        display: 'flex', flexDirection: 'column',
        boxShadow: '0 -8px 40px rgba(0,0,0,0.25)',
      }}>
        <div style={{ padding: '14px 16px 12px', borderBottom: `1px solid ${divider}`, flexShrink: 0 }}>
          <div style={{ width: 36, height: 4, borderRadius: 2, background: dark ? '#444' : '#D0CFC8', margin: '0 auto 12px' }} />
          <div style={{ fontWeight: 700, fontSize: 15 }}>Select task &amp; subtask — {gulperName}</div>
          <div style={{ fontSize: 12, color: ts, marginTop: 3 }}>Tap a task to expand, then pick a subtask. Current timer is logged.</div>
        </div>

        <div style={{ overflowY: 'auto', flex: 1 }}>
          {tasks.map(task => {
            const isCurrent = task.id === currentTaskId;
            const isExpanded = expandedTaskId === task.id;
            const hasSubs = task.subtasks.length > 0;
            return (
              <div key={task.id}>
                <button onClick={() => handleTaskClick(task)} style={{
                  width: '100%', textAlign: 'left', padding: '13px 16px',
                  background: isCurrent && !hasSubs ? (dark ? 'rgba(232,160,32,0.12)' : 'rgba(232,160,32,0.08)') : 'transparent',
                  border: 'none', cursor: 'pointer',
                  display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                  borderBottom: `1px solid ${isExpanded ? 'transparent' : divider}`,
                  borderLeft: isCurrent ? `3px solid ${accent}` : '3px solid transparent', gap: 8,
                }}>
                  <span style={{ fontWeight: isCurrent ? 700 : 500, fontSize: 16, color: isCurrent ? accent : tp }}>
                    {task.label}
                    {isCurrent && !hasSubs && <span style={{ fontSize: 10, fontWeight: 400, color: ts, marginLeft: 8 }}>current</span>}
                  </span>
                  {hasSubs && (
                    <span style={{ fontSize: 12, color: ts, transform: isExpanded ? 'rotate(180deg)' : 'none', transition: 'transform 0.18s', display: 'inline-block', flexShrink: 0 }}>▾</span>
                  )}
                </button>
                {hasSubs && isExpanded && (
                  <div style={{ background: dark ? 'rgba(255,255,255,0.03)' : 'rgba(0,0,0,0.025)', borderBottom: `1px solid ${divider}` }}>
                    {task.subtasks.map((sub, si) => {
                      const isCurSub = isCurrent && si === currentSubtaskIdx;
                      return (
                        <button key={si} onClick={() => onPick(task.id, si)} style={{
                          width: '100%', textAlign: 'left', padding: '11px 16px 11px 28px',
                          background: isCurSub ? (dark ? 'rgba(232,160,32,0.14)' : 'rgba(232,160,32,0.1)') : 'transparent',
                          border: 'none', cursor: 'pointer',
                          borderBottom: `1px solid ${divider}`,
                          display: 'flex', alignItems: 'center', gap: 10,
                        }}>
                          <div style={{ width: 7, height: 7, borderRadius: '50%', flexShrink: 0, background: isCurSub ? accent : (dark ? '#444' : '#C8C5BC') }} />
                          <span style={{ fontSize: 14, fontWeight: isCurSub ? 600 : 400, color: isCurSub ? accent : tp }}>{sub}</span>
                          {isCurSub && <span style={{ fontSize: 10, color: ts }}>current</span>}
                        </button>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}

          {/* Add custom task */}
          {!addingTask ? (
            <button onClick={() => setAddingTask(true)} style={{
              width: '100%', padding: '14px 16px', background: 'transparent', border: 'none', cursor: 'pointer',
              display: 'flex', alignItems: 'center', gap: 8, borderTop: `1px solid ${divider}`,
              color: ts,
            }}>
              <span style={{ fontSize: 20, lineHeight: 1, color: accent }}>+</span>
              <span style={{ fontSize: 15, fontWeight: 500 }}>Add custom task…</span>
            </button>
          ) : (
            <div style={{ padding: '14px 16px', borderTop: `1px solid ${divider}`, display: 'flex', flexDirection: 'column', gap: 10 }}>
              <div style={{ fontWeight: 600, fontSize: 14, color: tp }}>New task</div>
              <input
                autoFocus value={newTaskName} onChange={e => setNewTaskName(e.target.value)}
                placeholder="Task name (e.g. Equipment repair)"
                style={inputSt}
              />
              <input
                value={newSubtasks} onChange={e => setNewSubtasks(e.target.value)}
                placeholder="Subtasks, comma-separated (optional)"
                style={inputSt}
              />
              <div style={{ display: 'flex', gap: 8 }}>
                <button onClick={() => setAddingTask(false)} style={{
                  flex: 1, height: 40, borderRadius: 8, border: `1px solid ${divider}`,
                  background: 'transparent', color: ts, cursor: 'pointer', fontWeight: 600, fontSize: 14,
                }}>Cancel</button>
                <button onClick={submitNewTask} disabled={!newTaskName.trim()} style={{
                  flex: 1, height: 40, borderRadius: 8, border: 'none',
                  background: newTaskName.trim() ? accent : (dark ? '#2A2820' : '#E0DED6'),
                  color: newTaskName.trim() ? '#fff' : ts, cursor: newTaskName.trim() ? 'pointer' : 'default',
                  fontWeight: 700, fontSize: 14,
                }}>Add task</button>
              </div>
            </div>
          )}
          <div style={{ height: 24 }} />
        </div>
      </div>
    </>
  );
}

// ═══════════════════════════════════════════════════════════════════════
// SCREEN 3 — Review & Export
// ═══════════════════════════════════════════════════════════════════════
function ReviewScreen({ theme, session, tasks, gulpers, onBack, onNewSession, toggleTheme }) {
  const { dark, accent, bg, surface, surface2, divider, tp, ts } = theme;

  // Build entries with gulper label, editable elapsed
  const initEntries = () => {
    const entries = [];
    gulpers.forEach(g => {
      // Prefer name stored at log time; fall back to current name for legacy entries
      g.log.forEach(e => entries.push({ ...e, gulper: e.gulper || g.name, inProgress: false, note: '' }));
      const task = tasks.find(t => t.id === g.taskId);
      entries.push({
        gulper: g.name,
        task: task?.label || g.taskId,
        subtask: task?.subtasks[g.subtaskIdx] || task?.label || '',
        ms: g.running && g.lastStart ? g.elapsed + (Date.now() - g.lastStart) : g.elapsed,
        ts: new Date(), inProgress: true, note: '',
      });
    });
    return entries;
  };

  const [entries, setEntries] = useState(initEntries);
  const [globalNote, setGlobalNote] = useState('');
  const [toast, setToast] = useState(null);

  function showToast(msg) { setToast(msg); setTimeout(() => setToast(null), 3500); }

  function buildSessionInfoRows() {
    const rows = [];
    rows.push(['SESSION INFORMATION', '']);
    rows.push(['Job ID', session.jobId || '']);
    rows.push(['Enumerator', session.enumerator || '']);
    rows.push(['Session Start', fmtLocalDate(session.sessionStart), fmtLocalTime(session.sessionStart)]);
    rows.push(['Session End', fmtLocalDate(new Date()), fmtLocalTime(new Date())]);
    rows.push(['Pit Latrine GPS', fmtCoords(session.latrineCoords)]);
    rows.push([session.gulper1Name + ' Home GPS', fmtCoords(session.gulper1Home)]);
    rows.push([session.gulper2Name + ' Home GPS', fmtCoords(session.gulper2Home)]);
    rows.push(['Session Notes', globalNote || '']);
    rows.push([]);
    rows.push(['TASK SUMMARY', '', '', '']);
    rows.push(['Gulper', 'Task', 'Subtask', 'Total Time (s)']);
    const summary = {};
    entries.forEach(e => {
      const key = `${e.gulper || ''}||${e.task || ''}||${e.subtask || ''}`;
      summary[key] = (summary[key] || 0) + (e.ms || 0);
    });
    Object.entries(summary).forEach(([key, ms]) => {
      const [gulper, task, subtask] = key.split('||');
      rows.push([gulper, task, subtask, (ms/1000).toFixed(1)]);
    });
    return rows;
  }

  function buildTimeLogRows() {
    const header = ['Gulper', 'Task', 'Subtask', 'Elapsed (s)', 'Date', 'Time', 'Note'];
    const data = entries.map(e => {
      const dt = e.ts instanceof Date ? e.ts : new Date(e.ts);
      return [
        e.gulper || '', e.task || '', e.subtask || '',
        ((e.ms||0)/1000).toFixed(1),
        fmtLocalDate(dt), fmtLocalTime(dt),
        e.note || '',
      ];
    });
    return [header, ...data];
  }

  function exportCSV() {
    const infoRows = buildSessionInfoRows();
    const logRows = buildTimeLogRows();
    const all = [...infoRows, [], ['--- TIME LOG ---'], ...logRows];
    const csv = all.map(r => r.map(c => `"${(c||'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `gulper_${session.jobId}_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  }

  const [sheetsModal, setSheetsModal] = useState(false);
  const [copied1, setCopied1] = useState(false);
  const [copied2, setCopied2] = useState(false);
  const tsvRef1 = useRef(null);
  const tsvRef2 = useRef(null);

  function openSheetsModal() { setSheetsModal(true); setCopied1(false); setCopied2(false); }

  function copyData(rows, ref, setCopied) {
    const tsv = rows.map(r => r.join('\t')).join('\n');
    function fallback() {
      if (ref.current) {
        ref.current.value = tsv;
        ref.current.select();
        ref.current.setSelectionRange(0, 99999);
        try { document.execCommand('copy'); setCopied(true); } catch(e) {}
      }
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(tsv).then(() => setCopied(true)).catch(fallback);
    } else { fallback(); }
  }

  const inpSt = {
    background: dark ? '#1A1917' : '#F5F4F0',
    border: `1px solid ${divider}`, borderRadius: 6,
    color: tp, fontSize: 12, fontFamily: 'IBM Plex Sans', outline: 'none', padding: '4px 8px',
  };

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {/* Header */}
      <div style={{ padding: '14px 16px', background: surface, borderBottom: `1px solid ${divider}`, flexShrink: 0, display: 'flex', alignItems: 'center', gap: 12 }}>
        <button onClick={onBack} style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: ts, fontSize: 20, lineHeight: 1, padding: 0 }}>←</button>
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 700, fontSize: 17 }}>Session Review</div>
          <div style={{ fontSize: 12, color: ts }}>Check everything before exporting.</div>
        </div>
        {/* Theme toggle */}
        <button
          onClick={toggleTheme}
          title={dark ? 'Switch to light mode' : 'Switch to dark mode'}
          style={{
            width: 38, height: 38, borderRadius: 8, border: `1px solid ${divider}`,
            background: 'transparent', cursor: 'pointer', flexShrink: 0,
            display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20,
          }}
        >{dark ? '☀️' : '🌙'}</button>
      </div>

      <div style={{ flex: 1, minHeight: 0, position: 'relative' }}>
        <div style={{ position: 'absolute', inset: 0, overflowY: 'auto', overflowX: 'hidden', padding: '16px', display: 'flex', flexDirection: 'column', gap: 16, WebkitOverflowScrolling: 'touch' }}>

        {/* Session metadata */}
        <div style={{ background: surface, borderRadius: 12, border: `1px solid ${divider}` }}>
          <div style={{ padding: '10px 14px', borderBottom: `1px solid ${divider}`, fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: ts }}>Session Info</div>
          <div style={{ padding: '14px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px 16px' }}>
            {[
              ['Job ID', session.jobId || '—'],
              ['Enumerator', session.enumerator || '—'],
              ['Started', fmtWall(session.sessionStart)],
              ['Ended', fmtWall(new Date())],
              ['Pit latrine GPS', fmtCoords(session.latrineCoords)],
              [session.gulper1Name + ' home', fmtCoords(session.gulper1Home)],
              [session.gulper2Name + ' home', fmtCoords(session.gulper2Home)],
            ].map(([label, val], i) => (
              <div key={i}>
                <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.06em', textTransform: 'uppercase', color: ts, marginBottom: 3 }}>{label}</div>
                <div style={{ fontSize: 13, fontFamily: 'IBM Plex Mono', fontWeight: 500, color: tp, wordBreak: 'break-all' }}>{val}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Notes */}
        <div style={{ background: surface, borderRadius: 12, border: `1px solid ${divider}` }}>
          <div style={{ padding: '10px 14px', borderBottom: `1px solid ${divider}`, fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: ts }}>Session Notes</div>
          <div style={{ padding: 14 }}>
            <textarea
              value={globalNote} onChange={e => setGlobalNote(e.target.value)}
              placeholder="Any observations, anomalies, or comments about this session…"
              rows={4}
              style={{ ...inpSt, width: '100%', padding: '10px 12px', fontSize: 14, lineHeight: 1.6, resize: 'vertical' }}
            />
          </div>
        </div>

        {/* Spacer for export bar */}
        <div style={{ height: 80 }} />
      </div>
    </div>

      {/* Export bar */}
      <div style={{ padding: '12px 16px', background: surface, borderTop: `1px solid ${divider}`, display: 'flex', gap: 8, flexShrink: 0 }}>
        <button onClick={openSheetsModal} style={{
          flex: 1, height: 54, borderRadius: 10, border: 'none',
          background: accent, cursor: 'pointer', fontWeight: 700, fontSize: 15, color: '#fff',
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
        }}>
          <SheetsIcon /> Open in Google Sheets
        </button>
        <button onClick={onNewSession} title="New session" style={{
          height: 54, width: 54, borderRadius: 10,
          border: `1.5px solid ${divider}`,
          background: 'transparent', cursor: 'pointer',
          fontWeight: 700, fontSize: 22, color: ts,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>&#8635;</button>
      </div>

      {toast && (
        <div style={{
          position: 'fixed', bottom: 80, left: '50%', transform: 'translateX(-50%)',
          background: dark ? '#2A2820' : '#1A1917', color: '#fff',
          borderRadius: 10, padding: '10px 18px', fontSize: 13, fontWeight: 500,
          boxShadow: '0 4px 20px rgba(0,0,0,0.3)', pointerEvents: 'none', zIndex: 300,
          whiteSpace: 'nowrap', maxWidth: '90vw', textAlign: 'center',
        }}>{toast}</div>
      )}

      {/* Google Sheets two-sheet export modal */}
      {sheetsModal && <SheetsExportModal
        dark={dark} surface={surface} divider={divider} tp={tp} ts={ts} accent={accent}
        infoRows={buildSessionInfoRows()} logRows={buildTimeLogRows()}
        tsvRef1={tsvRef1} tsvRef2={tsvRef2}
        copied1={copied1} copied2={copied2}
        onCopy1={() => copyData(buildSessionInfoRows(), tsvRef1, setCopied1)}
        onCopy2={() => copyData(buildTimeLogRows(), tsvRef2, setCopied2)}
        onClose={() => setSheetsModal(false)}
      />}
    </div>
  );
}

function SheetsExportModal({ dark, surface, divider, tp, ts, accent, infoRows, logRows, tsvRef1, tsvRef2, copied1, copied2, onCopy1, onCopy2, onClose }) {
  const infoTsv = infoRows.map(r => r.join('\t')).join('\n');
  const logTsv  = logRows.map(r => r.join('\t')).join('\n');
  const taStyle = {
    width: '100%', padding: '7px 9px',
    background: dark ? '#0E0D0B' : '#EEECEA',
    border: `1px solid ${divider}`, borderRadius: 8,
    color: ts, fontSize: 10, fontFamily: 'IBM Plex Mono',
    outline: 'none', lineHeight: 1.4,
  };
  return (
    <>
      <div onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', zIndex: 400 }} />
      <div style={{
        position: 'fixed', top: '50%', left: '50%', transform: 'translate(-50%,-50%)',
        zIndex: 401, background: surface, borderRadius: 14,
        width: 'min(94vw, 480px)', maxHeight: '88vh',
        display: 'flex', flexDirection: 'column',
        boxShadow: '0 16px 60px rgba(0,0,0,0.35)', overflow: 'hidden',
      }}>
        <div style={{ padding: '16px 20px 12px', borderBottom: `1px solid ${divider}`, flexShrink: 0 }}>
          <div style={{ fontWeight: 700, fontSize: 17, marginBottom: 3 }}>Export to Google Sheets</div>
          <div style={{ fontSize: 13, color: ts, marginBottom: 12 }}>Open your sheet first, then copy each dataset and paste into its own tab.</div>
          <button onClick={() => window.open('https://sheets.new', '_blank')} style={{
            width: '100%', height: 46, borderRadius: 10, border: 'none',
            background: accent, cursor: 'pointer', fontWeight: 700, fontSize: 15, color: '#fff',
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
          }}><SheetsIcon /> 1. Open Google Sheets</button>
        </div>

        <div style={{ flex: 1, minHeight: 0, overflowY: 'auto', padding: '14px 20px', display: 'flex', flexDirection: 'column', gap: 16 }}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {[
              'Copy "Session Info" below → paste into Sheet1 (cell A1), rename tab "Session Info"',
              'Add a new sheet tab, name it "Time Log"',
              'Copy "Time Log" below → paste into A1 of that tab',
            ].map((s, i) => (
              <div key={i} style={{ display: 'flex', gap: 10, alignItems: 'flex-start' }}>
                <div style={{ width: 20, height: 20, borderRadius: '50%', background: dark ? '#333' : '#E0DED6', color: tp, fontWeight: 700, fontSize: 11, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, marginTop: 1 }}>{i+2}</div>
                <span style={{ fontSize: 13, color: tp, lineHeight: 1.5 }}>{s}</span>
              </div>
            ))}
          </div>

          {/* Sheet 1 */}
          <div style={{ background: dark ? '#1A1917' : '#F5F4F0', borderRadius: 10, padding: 12, border: `1px solid ${divider}` }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
              <div>
                <div style={{ fontWeight: 700, fontSize: 13, color: tp }}>Sheet 1 — Session Info</div>
                <div style={{ fontSize: 11, color: ts }}>{infoRows.length} rows · summary + task totals</div>
              </div>
              <button onClick={onCopy1} style={{
                padding: '6px 14px', borderRadius: 7, border: 'none',
                background: copied1 ? '#3A9E5A' : accent, color: '#fff',
                fontWeight: 700, fontSize: 13, cursor: 'pointer', transition: 'background 0.2s', flexShrink: 0,
              }}>{copied1 ? '✓ Copied!' : 'Copy'}</button>
            </div>
            <textarea readOnly value={infoTsv} ref={tsvRef1} onClick={e => e.target.select()} rows={4} style={taStyle} />
          </div>

          {/* Sheet 2 */}
          <div style={{ background: dark ? '#1A1917' : '#F5F4F0', borderRadius: 10, padding: 12, border: `1px solid ${divider}` }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
              <div>
                <div style={{ fontWeight: 700, fontSize: 13, color: tp }}>Sheet 2 — Time Log</div>
                <div style={{ fontSize: 11, color: ts }}>{logRows.length} rows incl. header</div>
              </div>
              <button onClick={onCopy2} style={{
                padding: '6px 14px', borderRadius: 7, border: 'none',
                background: copied2 ? '#3A9E5A' : accent, color: '#fff',
                fontWeight: 700, fontSize: 13, cursor: 'pointer', transition: 'background 0.2s', flexShrink: 0,
              }}>{copied2 ? '✓ Copied!' : 'Copy'}</button>
            </div>
            <textarea readOnly value={logTsv} ref={tsvRef2} onClick={e => e.target.select()} rows={4} style={taStyle} />
          </div>
          <div style={{ height: 8 }} />
        </div>

        <div style={{ padding: '12px 20px', borderTop: `1px solid ${divider}`, display: 'flex', gap: 8, flexShrink: 0 }}>
          <button onClick={onClose} style={{
            flex: 1, height: 46, borderRadius: 10, border: `1.5px solid ${divider}`,
            background: 'transparent', cursor: 'pointer', fontWeight: 600, fontSize: 14, color: tp,
          }}>Done</button>
        </div>
      </div>
    </>
  );
}

// ── Icons ─────────────────────────────────────────────────────────────
function StatusDot({ running, accent }) {
  return <div style={{ width: 10, height: 10, borderRadius: '50%', background: running ? accent : 'transparent', border: `2px solid ${running ? accent : '#AAAAAA'}`, boxShadow: running ? `0 0 0 3px ${accent}33` : 'none', transition: 'all 0.2s' }} />;
}
function PlayIcon({ color }) {
  return <svg width="14" height="14" viewBox="0 0 14 14"><polygon points="3,1 13,7 3,13" fill={color}/></svg>;
}
function PauseIcon({ color }) {
  return <svg width="14" height="14" viewBox="0 0 14 14"><rect x="2" y="1" width="4" height="12" rx="1.5" fill={color}/><rect x="8" y="1" width="4" height="12" rx="1.5" fill={color}/></svg>;
}
function NextIcon({ color }) {
  return <svg width="14" height="14" viewBox="0 0 14 14"><polygon points="2,2 10,7 2,12" fill={color}/><rect x="11" y="2" width="2" height="10" rx="1" fill={color}/></svg>;
}
function SheetsIcon() {
  return <svg width="16" height="16" viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2" fill="white" fillOpacity="0.3"/><rect x="7" y="8" width="10" height="1.5" rx="0.75" fill="white"/><rect x="7" y="11.5" width="10" height="1.5" rx="0.75" fill="white"/><rect x="7" y="15" width="6" height="1.5" rx="0.75" fill="white"/></svg>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
