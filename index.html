// TASK MANAGER
// ═══════════════════════════════════════════════════════════════════════
function TaskManager({ tasks, setTasks, setGulpers, onClose, theme }) {
  const { dark, accent, surface, surface2, divider, tp, ts } = theme;

  const [expandedIds,   setExpandedIds]   = useState(() => new Set(tasks.map(t => t.id)));
  const [editMode,      setEditMode]      = useState(null); // {type:'task'|'subtask', taskId, subIdx?}
  const [editLabel,     setEditLabel]     = useState('');
  const [editError,     setEditError]     = useState(null);
  const [addTaskOpen,   setAddTaskOpen]   = useState(false);
  const [newTaskLabel,  setNewTaskLabel]  = useState('');
  const [addTaskError,  setAddTaskError]  = useState(null);
  const [addingSubFor,  setAddingSubFor]  = useState(null); // taskId
  const [newSubLabel,   setNewSubLabel]   = useState('');
  const [addSubError,   setAddSubError]   = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null); // {type, taskId, subIdx?}
  const [movePicker,    setMovePicker]    = useState(null); // {taskId, subIdx}
  const [pendingImport, setPendingImport] = useState(null);
  const importRef = useRef(null);

  function toggleExpand(id) {
    setExpandedIds(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  }

  // ── Rename ────────────────────────────────────────────────────────────
  function startEditTask(t) {
    setEditMode({ type: 'task', taskId: t.id });
    setEditLabel(t.label); setEditError(null);
    setAddTaskOpen(false); setAddingSubFor(null);
  }
  function startEditSubtask(taskId, subIdx, label) {
    setEditMode({ type: 'subtask', taskId, subIdx });
    setEditLabel(label); setEditError(null);
    setAddTaskOpen(false); setAddingSubFor(null);
  }
  function saveEdit() {
    const label = editLabel.trim();
    if (!label) { setEditError('Name cannot be empty.'); return; }
    if (editMode.type === 'task') {
      const oldTask = tasks.find(t => t.id === editMode.taskId);
      if (!oldTask) return;
      if (tasks.some(t => t.id !== editMode.taskId && t.label.toLowerCase() === label.toLowerCase())) {
        setEditError(`"${label}" already exists.`); return;
      }
      const oldLabel = oldTask.label;
      setTasks(prev => prev.map(t => t.id === editMode.taskId ? { ...t, label } : t));
      setGulpers(gs => gs.map(g => ({
        ...g,
        log: g.log.map(e => e.task === oldLabel ? { ...e, task: label } : e),
      })));
    } else {
      const taskObj = tasks.find(t => t.id === editMode.taskId);
      if (!taskObj) return;
      const oldSubLabel = taskObj.subtasks[editMode.subIdx];
      if (taskObj.subtasks.some((s, i) => i !== editMode.subIdx && s.toLowerCase() === label.toLowerCase())) {
        setEditError(`"${label}" already exists under ${taskObj.label}.`); return;
      }
      setTasks(prev => prev.map(t => t.id === editMode.taskId
        ? { ...t, subtasks: t.subtasks.map((s, i) => i === editMode.subIdx ? label : s) }
        : t
      ));
      const taskLabel = taskObj.label;
      setGulpers(gs => gs.map(g => ({
        ...g,
        log: g.log.map(e => e.task === taskLabel && e.subtask === oldSubLabel ? { ...e, subtask: label } : e),
      })));
    }
    setEditMode(null); setEditLabel(''); setEditError(null);
  }
  function cancelEdit() { setEditMode(null); setEditLabel(''); setEditError(null); }

  // ── Add task ──────────────────────────────────────────────────────────
  function addTask() {
    const label = newTaskLabel.trim();
    if (!label) { setAddTaskError('Name cannot be empty.'); return; }
    if (tasks.some(t => t.label.toLowerCase() === label.toLowerCase())) {
      setAddTaskError(`"${label}" already exists.`); return;
    }
    const id = 'custom_' + Date.now();
    setTasks(prev => [...prev, { id, label, subtasks: [] }]);
    setExpandedIds(prev => new Set([...prev, id]));
    setNewTaskLabel(''); setAddTaskOpen(false); setAddTaskError(null);
  }

  // ── Add subtask ───────────────────────────────────────────────────────
  function addSubtask(taskId) {
    const label = newSubLabel.trim();
    if (!label) { setAddSubError('Name cannot be empty.'); return; }
    const taskObj = tasks.find(t => t.id === taskId);
    if (!taskObj) return;
    if (taskObj.subtasks.some(s => s.toLowerCase() === label.toLowerCase())) {
      setAddSubError(`"${label}" already exists under ${taskObj.label}.`); return;
    }
    setTasks(prev => prev.map(t => t.id === taskId ? { ...t, subtasks: [...t.subtasks, label] } : t));
    setNewSubLabel(''); setAddingSubFor(null); setAddSubError(null);
  }

  // ── Delete ────────────────────────────────────────────────────────────
  function doDelete() {
    if (!confirmDelete) return;
    if (confirmDelete.type === 'task') {
      setTasks(prev => prev.filter(t => t.id !== confirmDelete.taskId));
    } else {
      setTasks(prev => prev.map(t => t.id === confirmDelete.taskId
        ? { ...t, subtasks: t.subtasks.filter((_, i) => i !== confirmDelete.subIdx) }
        : t
      ));
    }
    setConfirmDelete(null);
  }

  // ── Reorder ───────────────────────────────────────────────────────────
  function moveTaskUp(idx) {
    if (idx === 0) return;
    setTasks(prev => { const a = [...prev]; [a[idx-1], a[idx]] = [a[idx], a[idx-1]]; return a; });
  }
  function moveTaskDown(idx) {
    setTasks(prev => {
      if (idx >= prev.length - 1) return prev;
      const a = [...prev]; [a[idx], a[idx+1]] = [a[idx+1], a[idx]]; return a;
    });
  }
  function moveSubUp(taskId, si) {
    if (si === 0) return;
    setTasks(prev => prev.map(t => {
      if (t.id !== taskId) return t;
      const s = [...t.subtasks]; [s[si-1], s[si]] = [s[si], s[si-1]]; return { ...t, subtasks: s };
    }));
  }
  function moveSubDown(taskId, si) {
    setTasks(prev => prev.map(t => {
      if (t.id !== taskId) return t;
      if (si >= t.subtasks.length - 1) return t;
      const s = [...t.subtasks]; [s[si], s[si+1]] = [s[si+1], s[si]]; return { ...t, subtasks: s };
    }));
  }

  // ── Move subtask ──────────────────────────────────────────────────────
  function moveSubtaskTo(toTaskId) {
    if (!movePicker) return;
    const { taskId: fromId, subIdx } = movePicker;
    const fromTask = tasks.find(t => t.id === fromId);
    if (!fromTask) { setMovePicker(null); return; }
    const label = fromTask.subtasks[subIdx];
    setTasks(prev => prev.map(t => {
      if (t.id === fromId) return { ...t, subtasks: t.subtasks.filter((_, i) => i !== subIdx) };
      if (t.id === toTaskId) return { ...t, subtasks: [...t.subtasks, label] };
      return t;
    }));
    setMovePicker(null);
  }

  // ── Export / Import ───────────────────────────────────────────────────
  function exportJSON() {
    const blob = new Blob([JSON.stringify(tasks, null, 2)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = 'task_hierarchy.json'; a.click();
  }
  function handleFileImport(e) {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!Array.isArray(data)) { alert('Invalid file — expected a JSON array'); return; }
        setPendingImport(data);
      } catch(err) { alert('Could not parse file as JSON'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  // ── Shared styles ─────────────────────────────────────────────────────
  const iconBtn = {
    width: 28, height: 28, borderRadius: 6, border: `1px solid ${divider}`,
    background: 'transparent', cursor: 'pointer', fontSize: 13,
    display: 'flex', alignItems: 'center', justifyContent: 'center',
    color: ts, flexShrink: 0,
  };
  const smBtn = (hi) => ({
    padding: '5px 10px', borderRadius: 7, border: `1px solid ${hi ? accent : divider}`,
    background: hi ? accent : 'transparent', color: hi ? '#fff' : ts,
    cursor: 'pointer', fontSize: 12, fontWeight: hi ? 700 : 500, flexShrink: 0,
  });
  const delBtn = {
    padding: '5px 10px', borderRadius: 7, fontSize: 12, fontWeight: 500, flexShrink: 0,
    border: `1px solid ${dark ? '#4A1F1F' : '#F0CECE'}`,
    background: dark ? 'rgba(204,51,51,0.08)' : 'rgba(204,51,51,0.05)', color: '#CC3333', cursor: 'pointer',
  };
  const fieldSt = {
    flex: 1, padding: '7px 10px',
    background: surface2, border: `1px solid ${divider}`,
    borderRadius: 7, color: tp, fontSize: 14, outline: 'none',
  };

  return (
    <>
      <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', zIndex: 500 }} />
      <div style={{ position: 'fixed', inset: 0, zIndex: 501, display: 'flex', flexDirection: 'column', background: surface }}>

        {/* Header */}
        <div style={{ padding: '16px 16px 12px', borderBottom: `1px solid ${divider}`, flexShrink: 0, display: 'flex', alignItems: 'center', gap: 12 }}>
          <button onClick={onClose} style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: ts, fontSize: 20, lineHeight: 1, padding: 0 }}>←</button>
          <div style={{ flex: 1, fontWeight: 700, fontSize: 17 }}>Manage Tasks</div>
          <div style={{ display: 'flex', gap: 8 }}>
            <button onClick={exportJSON} style={smBtn(false)}>Export JSON</button>
            <button onClick={() => importRef.current?.click()} style={smBtn(false)}>Import JSON</button>
            <input ref={importRef} type="file" accept=".json" onChange={handleFileImport} style={{ display: 'none' }} />
          </div>
        </div>

        {/* Add task — sticky below header */}
        <div style={{ padding: '12px 16px', borderBottom: `1px solid ${divider}`, background: dark ? '#1A1917' : '#F5F4F0', flexShrink: 0 }}>
          {!addTaskOpen ? (
            <button onClick={() => { setAddTaskOpen(true); setEditMode(null); setAddingSubFor(null); }} style={{
              width: '100%', height: 46, borderRadius: 10,
              border: `1.5px dashed ${divider}`, background: 'transparent',
              color: ts, cursor: 'pointer', fontSize: 15, fontWeight: 600,
              display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
            }}>
              <span style={{ fontSize: 20, color: accent, lineHeight: 1 }}>+</span> Add task
            </button>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              <input autoFocus value={newTaskLabel}
                onChange={e => { setNewTaskLabel(e.target.value); setAddTaskError(null); }}
                onKeyDown={e => { if (e.key === 'Enter') addTask(); if (e.key === 'Escape') { setAddTaskOpen(false); setNewTaskLabel(''); setAddTaskError(null); } }}
                placeholder="New task name" style={{ ...fieldSt, flex: 'unset', width: '100%' }} />
              {addTaskError && <div style={{ fontSize: 12, color: '#CC3333' }}>{addTaskError}</div>}
              <div style={{ display: 'flex', gap: 8 }}>
                <button onClick={addTask} disabled={!newTaskLabel.trim()} style={{ ...smBtn(!!newTaskLabel.trim()), flex: 1, height: 40 }}>Add</button>
                <button onClick={() => { setAddTaskOpen(false); setNewTaskLabel(''); setAddTaskError(null); }} style={{ ...smBtn(false), flex: 1, height: 40 }}>Cancel</button>
              </div>
            </div>
          )}
        </div>

        {/* Task list — scrollable */}
        <div style={{ flex: 1, overflowY: 'auto' }}>
          {tasks.map((task, taskIdx) => {
            const isExpanded = expandedIds.has(task.id);
            const isEditingTask = editMode?.type === 'task' && editMode.taskId === task.id;
            return (
              <div key={task.id} style={{ borderBottom: `1px solid ${divider}` }}>
                {/* Task row */}
                <div style={{ display: 'flex', alignItems: 'center', padding: '10px 16px', gap: 6, minHeight: 52 }}>
                  <button onClick={() => toggleExpand(task.id)} style={{
                    ...iconBtn, border: 'none', fontSize: 10,
                    transform: isExpanded ? 'rotate(90deg)' : 'none', transition: 'transform 0.15s',
                  }}>▶</button>
                  {isEditingTask ? (
                    <>
                      <input autoFocus value={editLabel}
                        onChange={e => { setEditLabel(e.target.value); setEditError(null); }}
                        onKeyDown={e => { if (e.key === 'Enter') saveEdit(); if (e.key === 'Escape') cancelEdit(); }}
                        style={{ ...fieldSt, fontSize: 15, fontWeight: 600 }} />
                      <button onClick={saveEdit} style={smBtn(true)}>Save</button>
                      <button onClick={cancelEdit} style={smBtn(false)}>✕</button>
                    </>
                  ) : (
                    <>
                      <span style={{ flex: 1, fontSize: 15, fontWeight: 600, color: tp }}>{task.label}</span>
                      <span style={{ fontSize: 10, color: ts, flexShrink: 0, whiteSpace: 'nowrap' }}>
                        {task.subtasks.length > 0 ? `${task.subtasks.length} sub` : 'parent'}
                      </span>
                      <button onClick={() => moveTaskUp(taskIdx)} disabled={taskIdx === 0} style={{ ...iconBtn, opacity: taskIdx === 0 ? 0.3 : 1 }}>↑</button>
                      <button onClick={() => moveTaskDown(taskIdx)} disabled={taskIdx === tasks.length - 1} style={{ ...iconBtn, opacity: taskIdx === tasks.length - 1 ? 0.3 : 1 }}>↓</button>
                      <button onClick={() => startEditTask(task)} style={smBtn(false)}>Rename</button>
                      <button onClick={() => setConfirmDelete({ type: 'task', taskId: task.id })} style={delBtn}>Remove</button>
                    </>
                  )}
                </div>
                {isEditingTask && editError && (
                  <div style={{ padding: '0 16px 8px 54px', fontSize: 12, color: '#CC3333' }}>{editError}</div>
                )}

                {/* Subtasks */}
                {isExpanded && (
                  <div style={{ background: dark ? 'rgba(255,255,255,0.02)' : 'rgba(0,0,0,0.02)' }}>
                    {task.subtasks.map((sub, si) => {
                      const isEditingSub = editMode?.type === 'subtask' && editMode.taskId === task.id && editMode.subIdx === si;
                      return (
                        <div key={si} style={{ borderTop: `1px solid ${divider}` }}>
                          <div style={{ display: 'flex', alignItems: 'center', padding: '7px 16px 7px 40px', gap: 6, minHeight: 42 }}>
                            <div style={{ width: 5, height: 5, borderRadius: '50%', background: dark ? '#555' : '#C0BDB4', flexShrink: 0 }} />
                            {isEditingSub ? (
                              <>
                                <input autoFocus value={editLabel}
                                  onChange={e => { setEditLabel(e.target.value); setEditError(null); }}
                                  onKeyDown={e => { if (e.key === 'Enter') saveEdit(); if (e.key === 'Escape') cancelEdit(); }}
                                  style={fieldSt} />
                                <button onClick={saveEdit} style={smBtn(true)}>Save</button>
                                <button onClick={cancelEdit} style={smBtn(false)}>✕</button>
                              </>
                            ) : (
                              <>
                                <span style={{ flex: 1, fontSize: 14, color: tp }}>{sub}</span>
                                <button onClick={() => moveSubUp(task.id, si)} disabled={si === 0} style={{ ...iconBtn, opacity: si === 0 ? 0.3 : 1 }}>↑</button>
                                <button onClick={() => moveSubDown(task.id, si)} disabled={si === task.subtasks.length - 1} style={{ ...iconBtn, opacity: si === task.subtasks.length - 1 ? 0.3 : 1 }}>↓</button>
                                <button onClick={() => setMovePicker({ taskId: task.id, subIdx: si })} style={smBtn(false)}>Move</button>
                                <button onClick={() => startEditSubtask(task.id, si, sub)} style={smBtn(false)}>Rename</button>
                                <button onClick={() => setConfirmDelete({ type: 'subtask', taskId: task.id, subIdx: si })} style={delBtn}>Remove</button>
                              </>
                            )}
                          </div>
                          {isEditingSub && editError && (
                            <div style={{ padding: '0 16px 6px 56px', fontSize: 12, color: '#CC3333' }}>{editError}</div>
                          )}
                        </div>
                      );
                    })}

                    {/* Add subtask inline */}
                    {addingSubFor === task.id ? (
                      <div style={{ padding: '8px 16px 8px 40px', borderTop: `1px solid ${divider}`, display: 'flex', flexDirection: 'column', gap: 6 }}>
                        <div style={{ display: 'flex', gap: 8 }}>
                          <input autoFocus value={newSubLabel}
                            onChange={e => { setNewSubLabel(e.target.value); setAddSubError(null); }}
                            onKeyDown={e => { if (e.key === 'Enter') addSubtask(task.id); if (e.key === 'Escape') { setAddingSubFor(null); setNewSubLabel(''); setAddSubError(null); } }}
                            placeholder="Subtask name" style={fieldSt} />
                          <button onClick={() => addSubtask(task.id)} disabled={!newSubLabel.trim()} style={smBtn(!!newSubLabel.trim())}>Add</button>
                          <button onClick={() => { setAddingSubFor(null); setNewSubLabel(''); setAddSubError(null); }} style={smBtn(false)}>✕</button>
                        </div>
                        {addSubError && <div style={{ fontSize: 12, color: '#CC3333' }}>{addSubError}</div>}
                      </div>
                    ) : (
                      <button onClick={() => { setAddingSubFor(task.id); setNewSubLabel(''); setAddSubError(null); setEditMode(null); setAddTaskOpen(false); }} style={{
                        width: '100%', padding: '8px 16px 8px 40px', background: 'transparent',
                        border: 'none', borderTop: `1px solid ${divider}`, cursor: 'pointer',
                        display: 'flex', alignItems: 'center', gap: 8, color: ts,
                      }}>
                        <span style={{ fontSize: 16, color: accent, lineHeight: 1 }}>+</span>
                        <span style={{ fontSize: 13 }}>Add subtask…</span>
                      </button>
                    )}
                  </div>
                )}
              </div>
            );
          })}
          <div style={{ height: 40 }} />
        </div>

        {/* Delete confirmation */}
        {confirmDelete && (
          <>
            <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', zIndex: 600 }} />
            <div style={{
              position: 'fixed', top: '50%', left: '50%', transform: 'translate(-50%,-50%)',
              zIndex: 601, background: surface, borderRadius: 14,
              width: 'min(90vw, 360px)', padding: '24px 20px 20px',
              boxShadow: '0 16px 60px rgba(0,0,0,0.35)',
            }}>
              <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 8, color: tp }}>
                {confirmDelete.type === 'task' ? 'Remove task?' : 'Remove subtask?'}
              </div>
              <div style={{ fontSize: 14, color: ts, lineHeight: 1.6, marginBottom: 20 }}>
                Removing this {confirmDelete.type} will hide it from future task pickers. Any past CSV/xlsx files you've already exported are unaffected.
              </div>
              <div style={{ display: 'flex', gap: 10 }}>
                <button onClick={() => setConfirmDelete(null)} style={{ flex: 1, height: 44, borderRadius: 10, border: `1.5px solid ${divider}`, background: 'transparent', cursor: 'pointer', fontWeight: 600, fontSize: 14, color: tp }}>Cancel</button>
                <button onClick={doDelete} style={{ flex: 1, height: 44, borderRadius: 10, border: 'none', background: '#CC3333', cursor: 'pointer', fontWeight: 700, fontSize: 14, color: '#fff' }}>Remove</button>
              </div>
            </div>
          </>
        )}

        {/* Move subtask picker */}
        {movePicker && (() => {
          const fromTask = tasks.find(t => t.id === movePicker.taskId);
          return (
            <>
              <div onClick={() => setMovePicker(null)} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', zIndex: 600 }} />
              <div style={{
                position: 'fixed', top: '50%', left: '50%', transform: 'translate(-50%,-50%)',
                zIndex: 601, background: surface, borderRadius: 14,
                width: 'min(90vw, 360px)', padding: '20px',
                boxShadow: '0 16px 60px rgba(0,0,0,0.35)',
                maxHeight: '70vh', display: 'flex', flexDirection: 'column', gap: 12,
              }}>
                <div style={{ fontWeight: 700, fontSize: 16, color: tp }}>Move subtask to…</div>
                <div style={{ fontSize: 13, color: ts }}>
                  "{fromTask?.subtasks[movePicker.subIdx]}" from <strong style={{ color: tp }}>{fromTask?.label}</strong>
                </div>
                <div style={{ overflowY: 'auto', flex: 1, display: 'flex', flexDirection: 'column', gap: 6 }}>
                  {tasks.filter(t => t.id !== movePicker.taskId).map(t => (
                    <button key={t.id} onClick={() => moveSubtaskTo(t.id)} style={{
                      width: '100%', padding: '12px 14px', borderRadius: 8,
                      border: `1px solid ${divider}`, background: 'transparent',
                      cursor: 'pointer', fontWeight: 500, fontSize: 15, color: tp, textAlign: 'left',
                    }}>{t.label}</button>
                  ))}
                </div>
                <button onClick={() => setMovePicker(null)} style={{
                  height: 44, borderRadius: 10, border: `1px solid ${divider}`,
                  background: 'transparent', cursor: 'pointer', fontWeight: 600, fontSize: 14, color: ts,
                }}>Cancel</button>
              </div>
            </>
          );
        })()}

        {/* Import confirmation */}
        {pendingImport && (
          <>
            <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', zIndex: 600 }} />
            <div style={{
              position: 'fixed', top: '50%', left: '50%', transform: 'translate(-50%,-50%)',
              zIndex: 601, background: surface, borderRadius: 14,
              width: 'min(90vw, 360px)', padding: '24px 20px 20px',
              boxShadow: '0 16px 60px rgba(0,0,0,0.35)',
            }}>
              <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 8, color: tp }}>Replace task hierarchy?</div>
              <div style={{ fontSize: 14, color: ts, lineHeight: 1.6, marginBottom: 20 }}>
                This will replace the current {tasks.length} tasks with {pendingImport.length} tasks from the file. This cannot be undone.
              </div>
              <div style={{ display: 'flex', gap: 10 }}>
                <button onClick={() => setPendingImport(null)} style={{ flex: 1, height: 44, borderRadius: 10, border: `1.5px solid ${divider}`, background: 'transparent', cursor: 'pointer', fontWeight: 600, fontSize: 14, color: tp }}>Cancel</button>
                <button onClick={() => { setTasks(pendingImport); setExpandedIds(new Set(pendingImport.map(t => t.id))); setPendingImport(null); }} style={{ flex: 1, height: 44, borderRadius: 10, border: 'none', background: accent, cursor: 'pointer', fontWeight: 700, fontSize: 14, color: '#fff' }}>Replace</button>
              </div>
            </div>
          </>
        )}
      </div>
    </>
  );
}

// ═══════════════════════════════════════════════════════════════════════
// SCREEN 2 — Timer
// ═══════════════════════════════════════════════════════════════════════
function TimerScreen({ theme, session, setSession, tasks, setTasks, gulpers, setGulpers, onEnd, onBackToSetup, toggleTheme }) {
  const { divider } = theme;
  const [tick, setTick] = useState(0);
  const [picker, setPicker] = useState({ gulperIdx: null, open: false });
  const [notesOpen,    setNotesOpen]    = useState(false);
  const [managerOpen,  setManagerOpen]  = useState(false);
  const [pickerSaved,  setPickerSaved]  = useState(null);
  const count = gulpers.length;
  const is4 = count === 4;

  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 100);
    return () => clearInterval(id);
  }, []);

  function toggleTimer(idx) {
    setGulpers(gs => gs.map((g, i) => {
      if (i !== idx) return g;
      if (g.running) {
        return { ...g, running: false, accumulatedMs: g.accumulatedMs + (Date.now() - g.runningSince), runningSince: null };
      }
      return { ...g, running: true, runningSince: Date.now() };
    }));
  }

  function pickTask(gulperIdx, taskId, subtaskIdx) {
    setGulpers(gs => gs.map((g, i) => {
      if (i !== gulperIdx) return g;
      const elapsed = liveElapsed(g);
      const oldTask = tasks.find(t => t.id === g.taskId);
      const logEntries = elapsed > 2000 ? [{
        gulper_id: g.id || null,
        gulper: g.name,
        task: oldTask?.label,
        subtask: oldTask?.subtasks[g.subtaskIdx] || oldTask?.label,
        ms: elapsed, ts: new Date(),
      }, ...g.log] : g.log;
      return { ...g, taskId, subtaskIdx: subtaskIdx ?? 0, accumulatedMs: 0, running: true, runningSince: Date.now(), log: logEntries };
    }));
    setPicker({ gulperIdx: null, open: false });
  }

  function pauseAll(gs) {
    return gs.map(g => g.running
      ? { ...g, running: false, accumulatedMs: g.accumulatedMs + (Date.now() - g.runningSince), runningSince: null }
      : g
    );
  }

  function handleBackToSetup() { setGulpers(pauseAll); onBackToSetup(); }
  function handleEnd()         { setGulpers(pauseAll); onEnd(); }

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <TopBar
        session={session} setSession={setSession}
        onEnd={handleEnd} onBackToSetup={handleBackToSetup}
        toggleTheme={toggleTheme} theme={theme}
        onOpenNotes={() => setNotesOpen(true)}
      />

      <div style={{
        flex: 1, overflow: 'hidden', background: divider,
        ...(is4
          ? { display: 'grid', gridTemplateColumns: '1fr 1fr', gridTemplateRows: '1fr 1fr', gap: '1px' }
          : { display: 'flex', gap: '1px' }
        ),
      }}>
        {gulpers.map((g, idx) => (
          <GulperPanel
            key={idx} gulper={g} idx={idx} tasks={tasks}
            elapsed={liveElapsed(g)}
            gulperCount={count}
            onToggle={() => toggleTimer(idx)}
            onNextAndPick={() => {
              setGulpers(gs => gs.map((g, i) => {
                if (i !== idx) return g;
                const task = tasks.find(t => t.id === g.taskId);
                if (!task) return g; // stale/unknown task — skip log entry
                const elapsed = liveElapsed(g);
                const subtaskLabel = task.subtasks.length > 0 ? task.subtasks[g.subtaskIdx] : task.label;
                const entry = { gulper_id: g.id || null, gulper: g.name, task: task.label, subtask: subtaskLabel, ms: elapsed, ts: new Date() };
                return { ...g, running: false, accumulatedMs: 0, runningSince: null, log: [entry, ...g.log] };
              }));
              setPicker({ gulperIdx: idx, open: true });
            }}
            onPickTask={() => setPicker({ gulperIdx: idx, open: true })}
            theme={theme}
          />
        ))}
      </div>

      {picker.open && (
        <TaskPicker
          gulperName={gulpers[picker.gulperIdx]?.name}
          currentTaskId={gulpers[picker.gulperIdx]?.taskId}
          currentSubtaskIdx={gulpers[picker.gulperIdx]?.subtaskIdx}
          tasks={tasks}
          onPick={(tid, sidx) => pickTask(picker.gulperIdx, tid, sidx)}
          onClose={() => setPicker({ gulperIdx: null, open: false })}
          onManageTasks={() => {
            setPickerSaved(picker);
            setPicker({ gulperIdx: null, open: false });
            setManagerOpen(true);
          }}
          theme={theme}
        />
      )}

      {notesOpen && (
        <NotesEditor
          initialText={session.session_notes || ''}
          onSave={text => {
            setSession(s => ({ ...s, session_notes: text }));
            setNotesOpen(false);
          }}
          onCancel={() => setNotesOpen(false)}
          theme={theme}
        />
      )}

      {managerOpen && (
        <TaskManager
          tasks={tasks} setTasks={setTasks}
          setGulpers={setGulpers}
          onClose={() => {
            setManagerOpen(false);
            if (pickerSaved?.open) setPicker(pickerSaved);
            setPickerSaved(null);
          }}
          theme={theme}
        />
      )}
    </div>
  );
}

function TopBar({ session, setSession, onEnd, onBackToSetup, toggleTheme, theme, onOpenNotes }) {
  const { dark, surface, divider, tp, ts, accent } = theme;
  const [gpsLoading, setGpsLoading] = useState(false);
  const [gpsToast,   setGpsToast]   = useState(null);

  function captureLatrine() {
    if (!navigator.geolocation) return;
    setGpsLoading(true);
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        setSession(s => ({ ...s, latrineCoords: coords }));
        setGpsLoading(false);
        setGpsToast(`Latrine GPS saved: ${coords.lat.toFixed(5)}, ${coords.lng.toFixed(5)}`);
        setTimeout(() => setGpsToast(null), 3000);
      },
      () => { setGpsLoading(false); setGpsToast('Could not get location — try again.'); setTimeout(() => setGpsToast(null), 2500); },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }

  const hasLatrine = !!session.latrineCoords;

  return (
    <>
      <div style={{
        height: 52, display: 'flex', alignItems: 'center',
        padding: '0 8px', background: surface, borderBottom: `1px solid ${divider}`,
        flexShrink: 0, gap: 4, overflow: 'hidden',
      }}>
        <button onClick={onBackToSetup} style={{
          display: 'flex', alignItems: 'center', gap: 3,
          padding: '5px 8px', borderRadius: 7, border: `1px solid ${divider}`,
          background: 'transparent', cursor: 'pointer',
          color: ts, fontSize: 12, fontWeight: 600, flexShrink: 0, whiteSpace: 'nowrap',
        }}>← Setup</button>

        <div style={{ display: 'flex', alignItems: 'center', gap: 3, minWidth: 0, flex: 1, overflow: 'hidden' }}>
          <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: ts, flexShrink: 0 }}>Job</span>
          <span style={{ fontFamily: 'IBM Plex Mono', fontSize: 11, fontWeight: 600, color: tp, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{session.jobId}</span>
        </div>

        <button onClick={captureLatrine}
          title={hasLatrine ? `Latrine: ${fmtCoords(session.latrineCoords)} — tap to update` : 'Capture pit latrine GPS'}
          style={{
            display: 'flex', alignItems: 'center', gap: 4,
            padding: '4px 8px', borderRadius: 6, border: `1px solid ${hasLatrine ? accent : divider}`,
            background: hasLatrine ? (dark ? 'rgba(232,160,32,0.1)' : 'rgba(232,160,32,0.07)') : 'transparent',
            cursor: 'pointer', flexShrink: 0,
          }}
        >
          <span style={{ fontSize: 13 }}>{gpsLoading ? '…' : '📍'}</span>
          <span className="topbar-latrine-text" style={{ fontSize: 11, fontWeight: 600, color: hasLatrine ? accent : ts, whiteSpace: 'nowrap' }}>
            {gpsLoading ? 'Getting…' : hasLatrine ? 'Latrine ✓' : 'Latrine GPS'}
          </span>
        </button>

        <div className="topbar-started" style={{ display: 'flex', alignItems: 'center', gap: 3, flexShrink: 0 }}>
          <span style={{ fontSize: 10, color: ts }}>Started</span>
          <span style={{ fontFamily: 'IBM Plex Mono', fontSize: 11, fontWeight: 600, color: tp }}>{fmtWall(session.sessionStart)}</span>
        </div>

        <button onClick={toggleTheme} title={dark ? 'Switch to light mode' : 'Switch to dark mode'} style={{
          width: 34, height: 34, borderRadius: 8, border: `1px solid ${divider}`,
          background: 'transparent', cursor: 'pointer', flexShrink: 0,
          display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 17,
        }}>{dark ? '☀️' : '🌙'}</button>

        <button onClick={onOpenNotes} title="Session notes" style={{
          width: 34, height: 34, borderRadius: 8, flexShrink: 0,
          border: `1px solid ${session?.session_notes ? accent : divider}`,
          background: session?.session_notes ? (dark ? 'rgba(232,160,32,0.12)' : 'rgba(232,160,32,0.08)') : 'transparent',
          cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <NotesIcon color={session?.session_notes ? accent : ts} />
        </button>

        <button onClick={onEnd} style={{
          height: 40, padding: '0 14px', borderRadius: 8,
          border: 'none', background: '#CC3333', color: '#fff',
          fontWeight: 700, fontSize: 13, cursor: 'pointer', flexShrink: 0, whiteSpace: 'nowrap',
        }}>End Session</button>
      </div>

      {gpsToast && (
        <div style={{
          position: 'fixed', top: 60, left: '50%', transform: 'translateX(-50%)',
          background: dark ? '#2A2820' : '#1A1917', color: '#fff',
          borderRadius: 8, padding: '8px 16px', fontSize: 12, fontWeight: 500,
          boxShadow: '0 4px 20px rgba(0,0,0,0.3)', pointerEvents: 'none', zIndex: 300,
          whiteSpace: 'nowrap', maxWidth: '90vw',
        }}>{gpsToast}</div>
      )}
    </>
  );
}

function GulperPanel({ gulper, idx, tasks, elapsed, onToggle, onNextAndPick, onPickTask, theme, gulperCount }) {
  const { dark, accent, surface, divider, tp, ts } = theme;
  const taskFromHierarchy = gulper.taskId ? tasks.find(t => t.id === gulper.taskId) : null;
  const isUnknownTask = gulper.taskId !== null && !taskFromHierarchy;
  const isEmpty      = gulper.taskId === null && gulper.log.length === 0;
  const showPicker   = isEmpty || isUnknownTask;
  const task         = showPicker ? null : taskFromHierarchy;
  const hasSubtasks  = task ? task.subtasks.length > 0 : false;
  const subtaskLabel = hasSubtasks ? task.subtasks[gulper.subtaskIdx] : null;
  const logBg = dark ? '#181714' : '#F0EFE8';

  // Scale UI for 3 or 4 gulpers
  const sz = gulperCount <= 2 ? 'normal' : gulperCount === 3 ? 'compact' : 'mini';
  const nameFontSize    = { normal: 26, compact: 20, mini: 18 }[sz];
  const taskFontSize    = { normal: 26, compact: 20, mini: 18 }[sz];
  const subtaskFontSize = { normal: 18, compact: 14, mini: 13 }[sz];
  const timerFontSize   = { normal: 'clamp(30px, 6vw, 50px)', compact: 'clamp(22px, 4.5vw, 38px)', mini: 'clamp(18px, 4vw, 32px)' }[sz];
  const btnHeight       = { normal: 52, compact: 44, mini: 40 }[sz];
  const nextBtnHeight   = { normal: 56, compact: 46, mini: 42 }[sz];
  const padH            = { normal: 14, compact: 10, mini: 8  }[sz];

  if (showPicker) {
    return (
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: surface, overflow: 'hidden', minWidth: 0 }}>
        <div style={{ padding: `8px ${padH}px 6px`, borderBottom: `1px solid ${divider}`, flexShrink: 0 }}>
          <div style={{ textAlign: 'center', fontWeight: 700, fontSize: nameFontSize, color: tp, letterSpacing: '-0.01em', lineHeight: 1.15 }}>
            {gulper.name}
          </div>
        </div>
        <div style={{ flex: 1, display: 'flex', padding: padH }}>
          <button onClick={onPickTask} style={{
            flex: 1, borderRadius: 14, border: `2px dashed ${divider}`,
            background: 'transparent', cursor: 'pointer',
            display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 8,
            color: ts,
          }}>
            <span style={{ fontSize: 28 }}>＋</span>
            <span style={{ fontSize: sz === 'normal' ? 15 : 13, fontWeight: 600 }}>Select task and subtask</span>
          </button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: surface, overflow: 'hidden', minWidth: 0 }}>
      <div style={{ padding: `8px ${padH}px 6px`, borderBottom: `1px solid ${divider}`, flexShrink: 0, position: 'relative' }}>
        <div style={{ textAlign: 'center', fontWeight: 700, fontSize: nameFontSize, color: tp, letterSpacing: '-0.01em', lineHeight: 1.15, paddingRight: 20 }}>
          {gulper.name}
        </div>
        <div style={{ position: 'absolute', top: '50%', right: padH, transform: 'translateY(-50%)' }}>
          <StatusDot running={gulper.running} accent={accent} />
        </div>
      </div>

      <div style={{ padding: `6px ${padH}px 3px`, flexShrink: 0 }}>
        <button onClick={onPickTask} style={{ background: 'transparent', border: 'none', cursor: 'pointer', padding: '2px 0', display: 'flex', alignItems: 'center', gap: 5, color: tp, maxWidth: '100%' }}>
          <span style={{ fontSize: taskFontSize, fontWeight: 700, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{task.label}</span>
          <span style={{ fontSize: 13, color: ts, marginTop: 2, flexShrink: 0 }}>▾</span>
        </button>
        {hasSubtasks && (
          <div style={{ fontSize: subtaskFontSize, fontWeight: 600, color: tp, marginTop: 1, paddingLeft: 2, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
            {subtaskLabel}
            <span style={{ color: dark ? '#555' : '#C0BDB4', marginLeft: 6, fontSize: Math.round(subtaskFontSize * 0.75), fontWeight: 400 }}>
              {gulper.subtaskIdx + 1}/{task.subtasks.length}
            </span>
          </div>
        )}
      </div>

      <div style={{
        margin: `4px ${padH}px 6px`, borderRadius: 10, padding: '10px 12px',
        background: gulper.running ? (dark ? 'rgba(232,160,32,0.1)' : 'rgba(232,160,32,0.07)') : (dark ? '#1A1917' : '#F5F4F0'),
        border: `2px solid ${gulper.running ? accent : 'transparent'}`,
        transition: 'border-color 0.2s, background 0.2s', flexShrink: 0,
      }}>
        <div style={{
          fontFamily: 'IBM Plex Mono', fontSize: timerFontSize, fontWeight: 700,
          letterSpacing: '-0.02em', color: gulper.running ? accent : tp, lineHeight: 1, transition: 'color 0.2s',
        }}>{fmtTimer(elapsed)}</div>
      </div>

      <div style={{ padding: `0 ${padH}px`, display: 'flex', flexDirection: 'column', gap: 6, flexShrink: 0 }}>
        <button onClick={onToggle} style={{
          height: btnHeight, borderRadius: 10, border: 'none', cursor: 'pointer',
          background: gulper.running ? (dark ? '#2A2820' : '#FFF3DC') : accent,
          color: gulper.running ? accent : '#fff',
          fontWeight: 700, fontSize: sz === 'normal' ? 16 : 14, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
        }}>
          {gulper.running ? <><PauseIcon color={accent} /> Pause</> : <><PlayIcon color="#fff" /> Resume</>}
        </button>
        {/* Always enabled — Rest and Disposal both need to log and open picker */}
        <button onClick={onNextAndPick} style={{
          height: nextBtnHeight, borderRadius: 10,
          border: `1.5px solid ${dark ? '#3A3930' : '#D8D6CD'}`,
          cursor: 'pointer', background: 'transparent', color: tp,
          fontWeight: 600, fontSize: sz === 'normal' ? 15 : 13,
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 5,
        }}>
          <NextIcon color={tp} />
          Done — select next task
        </button>
      </div>

      <div style={{ flex: 1, overflow: 'hidden', margin: '8px 0 0', display: 'flex', flexDirection: 'column', minHeight: 0 }}>
        <div style={{ padding: `0 ${padH}px 3px`, flexShrink: 0 }}>
          <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: ts }}>
            Log · {gulper.log.length} {gulper.log.length === 1 ? 'entry' : 'entries'}
          </span>
        </div>
        <div style={{ flex: 1, overflowY: 'auto', background: logBg, borderTop: `1px solid ${divider}` }}>
          {gulper.log.length === 0
            ? <div style={{ padding: `10px ${padH}px`, fontSize: 11, color: ts, fontStyle: 'italic' }}>No entries yet</div>
            : gulper.log.map((entry, ei) => (
              <div key={ei} style={{ padding: `6px ${padH}px`, borderBottom: `1px solid ${divider}`, display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', gap: 4 }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <span style={{ fontSize: 11, fontWeight: 600, color: tp, display: 'block', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                    {entry.subtask && entry.subtask !== entry.task ? `${entry.task} · ${entry.subtask}` : entry.task}
                  </span>
                  <span style={{ fontSize: 10, color: ts }}>{new Date(entry.ts).toTimeString().slice(0,8)}</span>
                </div>
                <span style={{ fontFamily: 'IBM Plex Mono', fontSize: 12, fontWeight: 600, color: tp, flexShrink: 0 }}>
                  {fmtTimer(entry.ms, true)}
                </span>
              </div>
            ))
          }
        </div>
      </div>
    </div>
  );
}

// ── Task Picker ────────────────────────────────────────────────────────
function TaskPicker({ gulperName, currentTaskId, currentSubtaskIdx, tasks, onPick, onClose, onManageTasks, theme }) {
  const { dark, accent, surface, divider, tp, ts } = theme;
  const [expandedTaskId, setExpandedTaskId] = useState(currentTaskId);

  function handleTaskClick(task) {
    if (task.subtasks.length === 0) { onPick(task.id, null); }
    else { setExpandedTaskId(prev => prev === task.id ? null : task.id); }
  }

  return (
    <>
      <div onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)', zIndex: 100 }} />
      <div style={{
        position: 'fixed', left: 0, right: 0, bottom: 0, zIndex: 101,
        background: surface, borderRadius: '16px 16px 0 0',
        maxHeight: '82vh', overflow: 'hidden',
        display: 'flex', flexDirection: 'column',
        boxShadow: '0 -8px 40px rgba(0,0,0,0.25)',
      }}>
        <div style={{ padding: '14px 16px 12px', borderBottom: `1px solid ${divider}`, flexShrink: 0 }}>
          <div style={{ width: 36, height: 4, borderRadius: 2, background: dark ? '#444' : '#D0CFC8', margin: '0 auto 12px' }} />
          <div style={{ fontWeight: 700, fontSize: 15 }}>Select task &amp; subtask — {gulperName}</div>
          <div style={{ fontSize: 12, color: ts, marginTop: 3 }}>Tap a task to expand, then pick a subtask. Current timer is logged.</div>
        </div>

        <div style={{ overflowY: 'auto', flex: 1 }}>
          {tasks.map(task => {
            const isCurrent = task.id === currentTaskId;
            const isExpanded = expandedTaskId === task.id;
            const hasSubs = task.subtasks.length > 0;
            return (
              <div key={task.id}>
                <button onClick={() => handleTaskClick(task)} style={{
                  width: '100%', textAlign: 'left', padding: '13px 16px',
                  background: isCurrent && !hasSubs ? (dark ? 'rgba(232,160,32,0.12)' : 'rgba(232,160,32,0.08)') : 'transparent',
                  border: 'none', cursor: 'pointer',
                  display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                  borderBottom: `1px solid ${isExpanded ? 'transparent' : divider}`,
                  borderLeft: isCurrent ? `3px solid ${accent}` : '3px solid transparent', gap: 8,
                }}>
                  <span style={{ fontWeight: isCurrent ? 700 : 500, fontSize: 16, color: isCurrent ? accent : tp }}>
                    {task.label}
                    {isCurrent && !hasSubs && <span style={{ fontSize: 10, fontWeight: 400, color: ts, marginLeft: 8 }}>current</span>}
                  </span>
                  {hasSubs && (
                    <span style={{ fontSize: 12, color: ts, transform: isExpanded ? 'rotate(180deg)' : 'none', transition: 'transform 0.18s', display: 'inline-block', flexShrink: 0 }}>▾</span>
                  )}
                </button>
                {hasSubs && isExpanded && (
                  <div style={{ background: dark ? 'rgba(255,255,255,0.03)' : 'rgba(0,0,0,0.025)', borderBottom: `1px solid ${divider}` }}>
                    {task.subtasks.map((sub, si) => {
                      const isCurSub = isCurrent && si === currentSubtaskIdx;
                      return (
                        <button key={si} onClick={() => onPick(task.id, si)} style={{
                          width: '100%', textAlign: 'left', padding: '11px 16px 11px 28px',
                          background: isCurSub ? (dark ? 'rgba(232,160,32,0.14)' : 'rgba(232,160,32,0.1)') : 'transparent',
                          border: 'none', cursor: 'pointer', borderBottom: `1px solid ${divider}`,
                          display: 'flex', alignItems: 'center', gap: 10,
                        }}>
                          <div style={{ width: 7, height: 7, borderRadius: '50%', flexShrink: 0, background: isCurSub ? accent : (dark ? '#444' : '#C8C5BC') }} />
                          <span style={{ fontSize: 14, fontWeight: isCurSub ? 600 : 400, color: isCurSub ? accent : tp }}>{sub}</span>
                          {isCurSub && <span style={{ fontSize: 10, color: ts }}>current</span>}
                        </button>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}

          <button onClick={onManageTasks} style={{
            width: '100%', padding: '13px 16px', background: 'transparent',
            border: 'none', borderTop: `1px solid ${divider}`, cursor: 'pointer',
            display: 'flex', alignItems: 'center', gap: 10, color: ts,
          }}>
            <span style={{ fontSize: 17, lineHeight: 1 }}>⚙</span>
            <span style={{ fontSize: 15, fontWeight: 500 }}>Manage Tasks…</span>
          </button>

          <div style={{ height: 24 }} />
        </div>
      </div>
    </>
  );
}

// ═══════════════════════════════════════════════════════════════════════
// SCREEN 3 — Review & Export
// ═══════════════════════════════════════════════════════════════════════
function ReviewScreen({ theme, session, tasks, gulpers, roster, onBack, onNewSession, toggleTheme }) {
  const { dark, accent, surface, divider, tp, ts } = theme;

  const initEntries = () => {
    const entries = [];
    gulpers.forEach(g => {
      g.log.forEach(e => entries.push({
        ...e,
        gulper_id: e.gulper_id || g.id || null,
        gulper: e.gulper || g.name,
        inProgress: false, note: '',
      }));
      if (g.taskId !== null) {
        const task = tasks.find(t => t.id === g.taskId);
        entries.push({
          gulper_id: g.id || null,
          gulper: g.name,
          task: task?.label || g.taskId,
          subtask: task?.subtasks[g.subtaskIdx] || task?.label || '',
          ms: liveElapsed(g),
          ts: new Date(), inProgress: true, note: '',
        });
      }
    });
    return entries;
  };

  const [entries,    setEntries]    = useState(initEntries);
  const [globalNote, setGlobalNote] = useState(session.session_notes || '');
  const [toast,      setToast]      = useState(null);
  const [hasExported, setHasExported] = useState(false);
  const [confirmNew,  setConfirmNew]  = useState(false);

  function showToast(msg) { setToast(msg); setTimeout(() => setToast(null), 3500); }

  const gulperSelections = session.gulperSelections || [];

  function buildSessionInfo() {
    const now = new Date();
    const header = [
      'job_id', 'enumerator_first_name', 'enumerator_last_name', 'date',
      'session_start_time', 'session_end_time',
      'latrine_gps_lat', 'latrine_gps_lng', 'num_gulpers',
      'gulper_1_id', 'gulper_1_first_name', 'gulper_1_last_name',
      'gulper_2_id', 'gulper_2_first_name', 'gulper_2_last_name',
      'gulper_3_id', 'gulper_3_first_name', 'gulper_3_last_name',
      'gulper_4_id', 'gulper_4_first_name', 'gulper_4_last_name',
      'session_notes',
    ];
    const gulperCols = [];
    for (let slot = 0; slot < 4; slot++) {
      const sel = gulperSelections[slot];
      if (sel) {
        const rEntry = (roster || []).find(r => r.id === sel.id);
        gulperCols.push(rosterIdToInt(sel.id), rEntry?.first_name || '', rEntry?.last_name || '');
      } else {
        gulperCols.push('', '', '');
      }
    }
    const row = [
      session.jobId || '',
      session.enumerator_first_name || (session.enumerator ? session.enumerator.split(' ')[0] : '') || '',
      session.enumerator_last_name  || (session.enumerator ? session.enumerator.split(' ').slice(1).join(' ') : '') || '',
      fmtLocalDate(session.sessionStart),
      fmtLocalTime(session.sessionStart),
      fmtLocalTime(now),
      session.latrineCoords ? parseFloat(session.latrineCoords.lat.toFixed(5)) : '',
      session.latrineCoords ? parseFloat(session.latrineCoords.lng.toFixed(5)) : '',
      gulperSelections.length,
      ...gulperCols,
      globalNote || '',
    ];
    return { header, row };
  }

  function buildTaskInfo() {
    const header = [
      'entry_number', 'gulper_id', 'task', 'subtask',
      'entry_start_time', 'entry_end_time', 'duration_seconds', 'job_id',
    ];
    const sortedEntries = [...entries].sort((a, b) => {
      const aStart = new Date(a.ts).getTime() - (a.ms || 0);
      const bStart = new Date(b.ts).getTime() - (b.ms || 0);
      return aStart - bStart;
    });
    const data = sortedEntries.map((e, i) => {
      const endTs      = e.ts instanceof Date ? e.ts : new Date(e.ts);
      const startTs    = new Date(endTs.getTime() - (e.ms || 0));
      const taskObj    = tasks.find(t => t.label === e.task);
      const subtaskVal = (taskObj && taskObj.subtasks.length > 0) ? (e.subtask || '') : '';
      return [
        i + 1,
        rosterIdToInt(e.gulper_id),
        e.task || '',
        subtaskVal,
        fmtLocalTime(startTs),
        fmtLocalTime(endTs),
        Math.round(((e.ms || 0) / 1000) * 10) / 10,
        session.jobId || '',
      ];
    });
    return { header, data };
  }

  function exportFilename(ext) {
    const rawId  = (session.jobId || 'session').replace(/^job_/, '');
    const safeId = rawId.replace(/[^a-zA-Z0-9._-]/g, '_');
    return `${safeId}.${ext}`;
  }

  function exportCSV() {
    const { header, data } = buildTaskInfo();
    const escapeHeader = c => {
      const s = String(c);
      return (s.includes(',') || s.includes('"') || s.includes('\n')) ? `"${s.replace(/"/g, '""')}"` : s;
    };
    const escapeData = c => {
      const s = (c === null || c === undefined || c === '') ? 'NA' : String(c);
      return (s.includes(',') || s.includes('"') || s.includes('\n')) ? `"${s.replace(/"/g, '""')}"` : s;
    };
    const csv = [
      header.map(escapeHeader).join(','),
      ...data.map(r => r.map(escapeData).join(',')),
    ].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = exportFilename('csv');
    a.click();
    setHasExported(true);
  }

  function exportXLSX() {
    if (typeof XLSX === 'undefined') { showToast('Excel library not loaded — check connection'); return; }
    const { header: siHeader, row: siRow } = buildSessionInfo();
    const { header: tiHeader, data: tiData } = buildTaskInfo();
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([siHeader, siRow]), 'Session Info');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([tiHeader, ...tiData]), 'Task Info');
    XLSX.writeFile(wb, exportFilename('xlsx'));
    setHasExported(true);
  }

  function handleNewSession() {
    if (!hasExported) { setConfirmNew(true); } else { onNewSession(); }
  }

  const inpSt = {
    background: dark ? '#1A1917' : '#F5F4F0',
    border: `1px solid ${divider}`, borderRadius: 6,
    color: tp, fontSize: 12, fontFamily: 'IBM Plex Sans', outline: 'none', padding: '4px 8px',
  };

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <div style={{ padding: '14px 16px', background: surface, borderBottom: `1px solid ${divider}`, flexShrink: 0, display: 'flex', alignItems: 'center', gap: 12 }}>
        <button onClick={onBack} style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: ts, fontSize: 20, lineHeight: 1, padding: 0 }}>←</button>
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 700, fontSize: 17 }}>Session Review</div>
          <div style={{ fontSize: 12, color: ts }}>Check everything before exporting.</div>
        </div>
        <button onClick={toggleTheme} title={dark ? 'Switch to light mode' : 'Switch to dark mode'} style={{
          width: 38, height: 38, borderRadius: 8, border: `1px solid ${divider}`,
          background: 'transparent', cursor: 'pointer', flexShrink: 0,
          display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20,
        }}>{dark ? '☀️' : '🌙'}</button>
      </div>

      <div style={{ flex: 1, minHeight: 0, position: 'relative' }}>
        <div style={{ position: 'absolute', inset: 0, overflowY: 'auto', overflowX: 'hidden', padding: '16px', display: 'flex', flexDirection: 'column', gap: 16, WebkitOverflowScrolling: 'touch' }}>

          <div style={{ background: surface, borderRadius: 12, border: `1px solid ${divider}` }}>
            <div style={{ padding: '10px 14px', borderBottom: `1px solid ${divider}`, fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: ts }}>Session Info</div>
            <div style={{ padding: '14px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px 16px' }}>
              {[
                ['Job ID',         session.jobId || '—'],
                ['Enumerator', (() => { const fn = session.enumerator_first_name; const ln = session.enumerator_last_name; if (fn || ln) return [ln, fn].filter(Boolean).join(', '); return session.enumerator || '—'; })()],
                ['Started',        fmtWall(session.sessionStart)],
                ['Ended',          fmtWall(new Date())],
                ['Pit latrine GPS', fmtCoords(session.latrineCoords)],
                ...gulperSelections.map((g, i) => [`Gulper ${i+1}`, g.name]),
              ].map(([label, val], i) => (
                <div key={i}>
                  <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.06em', textTransform: 'uppercase', color: ts, marginBottom: 3 }}>{label}</div>
                  <div style={{ fontSize: 13, fontFamily: 'IBM Plex Mono', fontWeight: 500, color: tp, wordBreak: 'break-all' }}>{val}</div>
                </div>
              ))}
            </div>
          </div>

          <div style={{ background: surface, borderRadius: 12, border: `1px solid ${divider}` }}>
            <div style={{ padding: '10px 14px', borderBottom: `1px solid ${divider}`, fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: ts }}>Session Notes</div>
            <div style={{ padding: 14 }}>
              <textarea
                value={globalNote} onChange={e => setGlobalNote(e.target.value)}
                placeholder="Any observations, anomalies, or comments about this session…"
                rows={4}
                style={{ ...inpSt, width: '100%', padding: '10px 12px', fontSize: 14, lineHeight: 1.6, resize: 'vertical' }}
              />
            </div>
          </div>

          <div style={{ height: 16 }} />
        </div>
      </div>

      <div style={{ padding: '12px 16px 20px', background: surface, borderTop: `1px solid ${divider}`, display: 'flex', flexDirection: 'column', gap: 8, flexShrink: 0 }}>
        <button onClick={exportXLSX} style={{
          height: 58, borderRadius: 12, border: 'none',
          background: accent, cursor: 'pointer', fontWeight: 700, fontSize: 17, color: '#fff',
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
        }}>
          <XlsxIcon /> Download .xlsx (Session + Task Info)
        </button>
        <button onClick={exportCSV} style={{
          height: 40, borderRadius: 8,
          border: `1px solid ${divider}`, background: 'transparent',
          cursor: 'pointer', fontWeight: 500, fontSize: 14, color: ts,
        }}>Download CSV (Task Info only)</button>
        <div style={{ height: 1, background: divider, margin: '4px 0' }} />
        <button onClick={handleNewSession} style={{
          height: 58, borderRadius: 12,
          border: `2px solid ${dark ? '#3A2200' : '#F0C060'}`,
          background: dark ? '#2A1800' : '#FFF8EC',
          cursor: 'pointer', fontWeight: 700, fontSize: 17, color: accent,
        }}>Start New Session</button>
      </div>

      {toast && (
        <div style={{
          position: 'fixed', bottom: 180, left: '50%', transform: 'translateX(-50%)',
          background: dark ? '#2A2820' : '#1A1917', color: '#fff',
          borderRadius: 10, padding: '10px 18px', fontSize: 13, fontWeight: 500,
          boxShadow: '0 4px 20px rgba(0,0,0,0.3)', pointerEvents: 'none', zIndex: 300,
          whiteSpace: 'nowrap', maxWidth: '90vw', textAlign: 'center',
        }}>{toast}</div>
      )}

      {confirmNew && (
        <>
          <div onClick={() => setConfirmNew(false)} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', zIndex: 400 }} />
          <div style={{
            position: 'fixed', top: '50%', left: '50%', transform: 'translate(-50%,-50%)',
            zIndex: 401, background: surface, borderRadius: 14,
            width: 'min(90vw, 360px)', padding: '24px 20px 20px',
            boxShadow: '0 16px 60px rgba(0,0,0,0.35)',
          }}>
            <div style={{ fontWeight: 700, fontSize: 17, marginBottom: 10, color: tp }}>Data not exported</div>
            <div style={{ fontSize: 14, color: ts, lineHeight: 1.6, marginBottom: 20 }}>
              You haven't downloaded the session data yet. Starting a new session will discard the current data. Continue?
            </div>
            <div style={{ display: 'flex', gap: 10 }}>
              <button onClick={() => setConfirmNew(false)} style={{
                flex: 1, height: 46, borderRadius: 10, border: `1.5px solid ${divider}`,
                background: 'transparent', cursor: 'pointer', fontWeight: 600, fontSize: 15, color: tp,
              }}>Cancel</button>
              <button onClick={() => { setConfirmNew(false); onNewSession(); }} style={{
                flex: 1, height: 46, borderRadius: 10, border: 'none',
                background: '#CC3333', cursor: 'pointer', fontWeight: 700, fontSize: 15, color: '#fff',
              }}>Discard &amp; Continue</button>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ── Notes Editor ──────────────────────────────────────────────────────
function NotesEditor({ initialText, onSave, onCancel, theme }) {
  const { dark, accent, surface, divider, tp, ts } = theme;
  const [text, setText] = useState(initialText);
  return (
    <>
      <div onClick={onCancel} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.4)', zIndex: 200 }} />
      <div style={{
        position: 'fixed', top: 60, left: 12, right: 12, zIndex: 201,
        background: surface, borderRadius: 14, padding: 16,
        boxShadow: '0 8px 40px rgba(0,0,0,0.3)',
        display: 'flex', flexDirection: 'column', gap: 12,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div style={{ fontWeight: 700, fontSize: 16, color: tp }}>Session Notes</div>
          <div style={{ fontSize: 11, color: ts }}>Timers continue while editing</div>
        </div>
        <textarea
          autoFocus
          value={text}
          onChange={e => setText(e.target.value)}
          placeholder="Type notes here…"
          rows={7}
          style={{
            width: '100%', padding: '10px 12px',
            background: dark ? '#1A1917' : '#F5F4F0',
            border: `1px solid ${divider}`, borderRadius: 8,
            color: tp, fontSize: 14, lineHeight: 1.6,
            fontFamily: 'IBM Plex Sans', outline: 'none', resize: 'none',
          }}
        />
        <div style={{ display: 'flex', gap: 10 }}>
          <button onClick={onCancel} style={{
            flex: 1, height: 44, borderRadius: 10,
            border: `1.5px solid ${divider}`, background: 'transparent',
            cursor: 'pointer', fontWeight: 600, fontSize: 15, color: tp,
          }}>Cancel</button>
          <button onClick={() => onSave(text)} style={{
            flex: 1, height: 44, borderRadius: 10, border: 'none',
            background: accent, cursor: 'pointer', fontWeight: 700, fontSize: 15, color: '#fff',
          }}>Save</button>
        </div>
      </div>
    </>
  );
}

// ── Icons ─────────────────────────────────────────────────────────────
function StatusDot({ running, accent }) {
  return <div style={{ width: 10, height: 10, borderRadius: '50%', background: running ? accent : 'transparent', border: `2px solid ${running ? accent : '#AAAAAA'}`, boxShadow: running ? `0 0 0 3px ${accent}33` : 'none', transition: 'all 0.2s' }} />;
}
function PlayIcon({ color }) {
  return <svg width="14" height="14" viewBox="0 0 14 14"><polygon points="3,1 13,7 3,13" fill={color}/></svg>;
}
function PauseIcon({ color }) {
  return <svg width="14" height="14" viewBox="0 0 14 14"><rect x="2" y="1" width="4" height="12" rx="1.5" fill={color}/><rect x="8" y="1" width="4" height="12" rx="1.5" fill={color}/></svg>;
}
function NextIcon({ color }) {
  return <svg width="14" height="14" viewBox="0 0 14 14"><polygon points="2,2 10,7 2,12" fill={color}/><rect x="11" y="2" width="2" height="10" rx="1" fill={color}/></svg>;
}
function NotesIcon({ color }) {
  return (
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <rect x="2" y="1" width="12" height="14" rx="2" stroke={color} strokeWidth="1.5"/>
      <line x1="5" y1="5" x2="11" y2="5" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
      <line x1="5" y1="8" x2="11" y2="8" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
      <line x1="5" y1="11" x2="9" y2="11" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
    </svg>
  );
}
function XlsxIcon() {
  return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style={{ flexShrink: 0 }}>
    <rect x="3" y="2" width="18" height="20" rx="2" fill="white" fillOpacity="0.25"/>
    <path d="M7 8.5l2.5 3.5L7 15.5M13 8.5l2.5 3.5-2.5 3.5" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
